<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <defs>
    <linearGradient id="mA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="mB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <linearGradient id="mC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
  </defs>
  <rect width="520" height="340" rx="16" fill="#f8fafc"/>
  <text x="260" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Princip směsí – smícháme dvě látky</text>

  <!-- Beaker A -->
  <rect x="40" y="60" width="120" height="160" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="42" y="110" width="116" height="108" rx="4" fill="url(#mA)" opacity="0.35"/>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="700" fill="#4338ca">20%</text>
  <text x="100" y="170" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">roztok A</text>
  <text x="100" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#4338ca">2 litry</text>

  <!-- Plus -->
  <text x="200" y="150" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="700" fill="#94a3b8">+</text>

  <!-- Beaker B -->
  <rect x="240" y="60" width="120" height="160" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <rect x="242" y="90" width="116" height="128" rx="4" fill="url(#mB)" opacity="0.35"/>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="700" fill="#065f46">50%</text>
  <text x="300" y="170" text-anchor="middle" font-family="system-ui" font-size="11" fill="#10b981">roztok B</text>
  <text x="300" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#065f46">3 litry</text>

  <!-- Arrow -->
  <text x="395" y="150" text-anchor="middle" font-family="system-ui" font-size="24" fill="#94a3b8">→</text>

  <!-- Beaker Result -->
  <rect x="420" y="50" width="80" height="180" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <rect x="422" y="80" width="76" height="148" rx="4" fill="url(#mC)" opacity="0.3"/>
  <text x="460" y="140" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#92400e">38%</text>
  <text x="460" y="162" text-anchor="middle" font-family="system-ui" font-size="10" fill="#b45309">směs</text>
  <text x="460" y="248" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#92400e">5 litrů</text>

  <!-- Explanation -->
  <rect x="30" y="270" width="460" height="52" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="260" y="290" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#4338ca">Čistá látka v A + čistá látka v B = čistá látka ve směsi</text>
  <text x="260" y="308" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">0,20 · 2 + 0,50 · 3 = 0,4 + 1,5 = 1,9 → 1,9 / 5 = 0,38 = 38 %</text>
</svg>