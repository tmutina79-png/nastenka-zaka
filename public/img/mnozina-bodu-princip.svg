<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Kružnice -->
  <g transform="translate(130, 200)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#818cf8" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <text x="0" y="-85" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Kružnice</text>
    <text x="8" y="5" fill="#fbbf24" font-size="12">S</text>
    <line x1="0" y1="0" x2="70" y2="0" stroke="#34d399" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="35" y="-8" fill="#34d399" font-size="11">r</text>
  </g>
  
  <!-- Osa úsečky -->
  <g transform="translate(300, 200)">
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#f87171" stroke-width="3"/>
    <circle cx="-60" cy="0" r="5" fill="#f87171"/>
    <circle cx="60" cy="0" r="5" fill="#f87171"/>
    <text x="-60" y="20" text-anchor="middle" fill="#f87171" font-size="12">A</text>
    <text x="60" y="20" text-anchor="middle" fill="#f87171" font-size="12">B</text>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#818cf8" stroke-width="3"/>
    <text x="0" y="-90" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Osa úsečky</text>
    <!-- Značka kolmosti -->
    <rect x="-8" y="-8" width="8" height="8" fill="none" stroke="#94a3b8" stroke-width="1"/>
  </g>
  
  <!-- Osa úhlu -->
  <g transform="translate(480, 200)">
    <line x1="0" y1="0" x2="-70" y2="-50" stroke="#34d399" stroke-width="3"/>
    <line x1="0" y1="0" x2="70" y2="-50" stroke="#34d399" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#818cf8" stroke-width="3" stroke-dasharray="8,4"/>
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <text x="5" y="15" fill="#fbbf24" font-size="12">V</text>
    <text x="0" y="-95" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Osa úhlu</text>
    <!-- Oblouky pro úhly -->
    <path d="M -15 -10 A 18 18 0 0 1 0 -18" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <path d="M 0 -18 A 18 18 0 0 1 15 -10" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>
  
  <!-- Rovnoběžky -->
  <g transform="translate(670, 200)">
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#fbbf24" stroke-width="3"/>
    <text x="75" y="5" fill="#fbbf24" font-size="12">p</text>
    <line x1="-70" y1="-40" x2="70" y2="-40" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>
    <line x1="-70" y1="40" x2="70" y2="40" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="0" y="-90" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Rovnoběžky</text>
    <!-- Vzdálenost -->
    <line x1="-50" y1="0" x2="-50" y2="-40" stroke="#94a3b8" stroke-width="1"/>
    <text x="-58" y="-18" fill="#94a3b8" font-size="10">d</text>
  </g>
  
  <!-- Popisek dole -->
  <text x="400" y="380" text-anchor="middle" fill="#64748b" font-size="13">Základní množiny bodů daných vlastností</text>
</svg>
