<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="playGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="worker1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="worker2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="worker3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bgGrad3)"/>
  
  <!-- Wall being built -->
  <g transform="translate(30, 35)">
    <!-- Wall background -->
    <rect x="0" y="50" width="180" height="60" rx="4" fill="#334155"/>
    
    <!-- Brick rows -->
    <g fill="url(#wallGrad)">
      <!-- Row 1 -->
      <rect x="0" y="90" width="35" height="18" rx="2"/>
      <rect x="38" y="90" width="35" height="18" rx="2"/>
      <rect x="76" y="90" width="35" height="18" rx="2"/>
      <rect x="114" y="90" width="35" height="18" rx="2"/>
      <rect x="152" y="90" width="28" height="18" rx="2"/>
      <!-- Row 2 -->
      <rect x="15" y="70" width="35" height="18" rx="2"/>
      <rect x="53" y="70" width="35" height="18" rx="2"/>
      <rect x="91" y="70" width="35" height="18" rx="2"/>
      <rect x="129" y="70" width="35" height="18" rx="2"/>
      <!-- Row 3 (partial) -->
      <rect x="0" y="50" width="35" height="18" rx="2"/>
      <rect x="38" y="50" width="35" height="18" rx="2"/>
      <rect x="76" y="50" width="35" height="18" rx="2" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Three workers -->
  <g transform="translate(220, 40)">
    <!-- Worker 1 -->
    <circle cx="20" cy="15" r="14" fill="url(#worker1)"/>
    <text x="20" y="20" text-anchor="middle" font-size="16">👷</text>
    <text x="20" y="38" text-anchor="middle" font-family="system-ui" font-size="8" fill="#a5b4fc">10h</text>
    
    <!-- Worker 2 -->
    <circle cx="55" cy="15" r="14" fill="url(#worker2)"/>
    <text x="55" y="20" text-anchor="middle" font-size="16">👷</text>
    <text x="55" y="38" text-anchor="middle" font-family="system-ui" font-size="8" fill="#6ee7b7">15h</text>
    
    <!-- Worker 3 -->
    <circle cx="37" cy="55" r="14" fill="url(#worker3)"/>
    <text x="37" y="60" text-anchor="middle" font-size="16">👷</text>
    <text x="37" y="78" text-anchor="middle" font-family="system-ui" font-size="8" fill="#fdba74">30h</text>
  </g>
  
  <!-- Formula -->
  <text x="235" y="105" font-family="system-ui" font-size="9" font-weight="600" fill="#94a3b8">1/10 + 1/15 + 1/30</text>
  <text x="252" y="118" font-family="system-ui" font-size="10" font-weight="700" fill="#10b981">= 1/5</text>
  <text x="245" y="132" font-family="system-ui" font-size="9" fill="#64748b">t = 5 hodin</text>
  
  <!-- Play button circle -->
  <circle cx="160" cy="130" r="28" fill="url(#playGrad3)" opacity="0.95"/>
  <circle cx="160" cy="130" r="28" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5"/>
  
  <!-- Play triangle -->
  <path d="M153 118 L153 142 L173 130 Z" fill="white"/>
  
  <!-- Video indicator strip -->
  <rect x="0" y="175" width="320" height="25" rx="0" fill="#0f172a"/>
  <rect x="0" y="175" width="320" height="1" fill="#334155"/>
  
  <!-- Workers icon -->
  <g transform="translate(12, 180)">
    <circle cx="5" cy="6" r="4" fill="#64748b"/>
    <circle cx="14" cy="6" r="4" fill="#64748b"/>
    <circle cx="9" cy="3" r="3" fill="#64748b"/>
  </g>
  
  <!-- Video label -->
  <text x="32" y="191" font-family="system-ui" font-size="11" font-weight="600" fill="#e2e8f0">▶ Tři pracovníci staví zeď</text>
  
  <!-- Duration badge -->
  <rect x="265" y="180" width="45" height="16" rx="4" fill="#334155"/>
  <text x="287" y="191" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#94a3b8">2:15</text>
</svg>
