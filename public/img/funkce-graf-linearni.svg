<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1e3a5f"/></marker>
  </defs>

  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="60" y1="40" x2="60" y2="360"/><line x1="120" y1="40" x2="120" y2="360"/>
    <line x1="180" y1="40" x2="180" y2="360"/><line x1="240" y1="40" x2="240" y2="360"/>
    <line x1="300" y1="40" x2="300" y2="360"/><line x1="360" y1="40" x2="360" y2="360"/>
    <line x1="420" y1="40" x2="420" y2="360"/><line x1="480" y1="40" x2="480" y2="360"/>
    <line x1="40" y1="60" x2="500" y2="60"/><line x1="40" y1="120" x2="500" y2="120"/>
    <line x1="40" y1="180" x2="500" y2="180"/><line x1="40" y1="240" x2="500" y2="240"/>
    <line x1="40" y1="300" x2="500" y2="300"/><line x1="40" y1="360" x2="500" y2="360"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="360" x2="500" y2="360" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="60" y1="360" x2="60" y2="30" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="505" y="375" font-size="14" font-weight="600" fill="#1e3a5f">x</text>
  <text x="45" y="28" font-size="14" font-weight="600" fill="#1e3a5f">y</text>

  <!-- Axis labels X -->
  <text x="120" y="378" text-anchor="middle" font-size="11" fill="#64748b">1</text>
  <text x="180" y="378" text-anchor="middle" font-size="11" fill="#64748b">2</text>
  <text x="240" y="378" text-anchor="middle" font-size="11" fill="#64748b">3</text>
  <text x="300" y="378" text-anchor="middle" font-size="11" fill="#64748b">4</text>
  <text x="360" y="378" text-anchor="middle" font-size="11" fill="#64748b">5</text>
  <text x="420" y="378" text-anchor="middle" font-size="11" fill="#64748b">6</text>
  <text x="480" y="378" text-anchor="middle" font-size="11" fill="#64748b">7</text>

  <!-- Axis labels Y -->
  <text x="50" y="304" text-anchor="end" font-size="11" fill="#64748b">1</text>
  <text x="50" y="244" text-anchor="end" font-size="11" fill="#64748b">2</text>
  <text x="50" y="184" text-anchor="end" font-size="11" fill="#64748b">3</text>
  <text x="50" y="124" text-anchor="end" font-size="11" fill="#64748b">4</text>
  <text x="50" y="64" text-anchor="end" font-size="11" fill="#64748b">5</text>

  <!-- Function f(x) = 0.5x + 1 → plotted as line -->
  <polyline
    points="60,300 120,270 180,240 240,210 300,180 360,150 420,120 480,90"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Label -->
  <text x="440" y="78" font-size="14" font-weight="700" fill="#2563eb">f(x) = ½x + 1</text>

  <!-- Highlighted point: f(4) = 3 -->
  <circle cx="300" cy="180" r="6" fill="#2563eb"/>
  <line x1="300" y1="360" x2="300" y2="180" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 3"/>
  <line x1="60" y1="180" x2="300" y2="180" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Annotation -->
  <rect x="305" y="158" width="90" height="22" rx="4" fill="white" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">f(4) = 3</text>

  <!-- Origin label -->
  <text x="52" y="375" text-anchor="end" font-size="11" fill="#64748b">0</text>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Graf lineární funkce</text>
</svg>
