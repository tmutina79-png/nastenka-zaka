<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <!-- Pozadí -->
  <rect width="800" height="280" fill="#1a1a2e"/>
  
  <!-- Nadpis -->
  <text x="400" y="30" fill="#888" font-family="Arial" font-size="14" text-anchor="middle">Ukázka různých fontů a stylů v Pythonu</text>
  
  <!-- Řádky s fonty -->
  <g transform="translate(50, 60)">
    <!-- Řádek 1: Arial normal -->
    <rect x="0" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="15" y="18" fill="#888" font-family="Courier" font-size="10">font=("Arial", 18, "normal")</text>
    <text x="15" y="36" fill="#ecf0f1" font-family="Arial" font-size="18">Normální text v Arial</text>
    
    <!-- Řádek 1b: Arial bold -->
    <rect x="340" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="355" y="18" fill="#888" font-family="Courier" font-size="10">font=("Arial", 18, "bold")</text>
    <text x="355" y="36" fill="#ecf0f1" font-family="Arial" font-size="18" font-weight="bold">Tučný text v Arial</text>
  </g>
  
  <g transform="translate(50, 115)">
    <!-- Řádek 2: Arial italic -->
    <rect x="0" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="15" y="18" fill="#888" font-family="Courier" font-size="10">font=("Arial", 18, "italic")</text>
    <text x="15" y="36" fill="#ecf0f1" font-family="Arial" font-size="18" font-style="italic">Kurzíva v Arial</text>
    
    <!-- Řádek 2b: Courier -->
    <rect x="340" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="355" y="18" fill="#888" font-family="Courier" font-size="10">font=("Courier", 16, "normal")</text>
    <text x="355" y="36" fill="#00ff00" font-family="Courier" font-size="16">Courier - jak terminál</text>
  </g>
  
  <g transform="translate(50, 170)">
    <!-- Řádek 3: Times -->
    <rect x="0" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="15" y="18" fill="#888" font-family="Courier" font-size="10">font=("Times", 20, "italic")</text>
    <text x="15" y="36" fill="#f39c12" font-family="Georgia" font-size="20" font-style="italic">Elegantní Times</text>
    
    <!-- Řádek 3b: Velký bold -->
    <rect x="340" y="0" width="320" height="45" rx="6" fill="#0f3460"/>
    <text x="355" y="18" fill="#888" font-family="Courier" font-size="10">font=("Arial", 28, "bold")</text>
    <text x="355" y="38" fill="#e74c3c" font-family="Arial" font-size="28" font-weight="bold">VELKÝ NADPIS</text>
  </g>
  
  <!-- Poznámka -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="700" height="40" rx="6" fill="#2c3e50"/>
    <text x="350" y="16" fill="#3498db" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">💡 TIP: Dostupné fonty závisí na operačním systému</text>
    <text x="350" y="32" fill="#aaa" font-family="Arial" font-size="10" text-anchor="middle">Arial, Courier, Times, Georgia fungují všude | Comic Sans MS, Segoe UI jsou specifické pro Windows</text>
  </g>
</svg>