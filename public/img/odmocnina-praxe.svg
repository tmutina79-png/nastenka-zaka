<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 310" font-family="system-ui, sans-serif">
  <text x="375" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">Kde potkáš odmocninu v praxi?</text>

  <!-- ===== 1. Úhlopříčka TV ===== -->
  <g transform="translate(15,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">📺</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Úhlopříčka obrazovky</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">Pythagorova věta</text>

    <!-- Mini TV diagram -->
    <rect x="45" y="90" width="130" height="80" rx="4" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="45" y1="170" x2="175" y2="90" stroke="#dc2626" stroke-width="2.5"/>
    <text x="120" y="140" font-size="10" font-weight="700" fill="#dc2626">d = ?</text>
    <text x="110" y="185" text-anchor="middle" font-size="10" fill="#64748b">130 cm</text>
    <text x="185" y="140" font-size="10" fill="#64748b">80</text>

    <text x="110" y="210" text-anchor="middle" font-size="11" fill="#1e3a5f">d = √(130² + 80²)</text>
    <text x="110" y="228" text-anchor="middle" font-size="11" fill="#1e3a5f">d = √(23 300)</text>
    <text x="110" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">d ≈ 153 cm</text>
  </g>

  <!-- ===== 2. Stavba ===== -->
  <g transform="translate(265,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">🏗️</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">Strana pozemku</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">Obsah čtverce → strana</text>

    <!-- Mini square -->
    <rect x="55" y="90" width="110" height="110" rx="4" fill="white" stroke="#16a34a" stroke-width="1.5"/>
    <text x="110" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">200 m²</text>
    <text x="110" y="168" text-anchor="middle" font-size="10" fill="#64748b">pozemek</text>

    <text x="110" y="218" text-anchor="middle" font-size="11" fill="#1e3a5f">a = √200</text>
    <text x="110" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">a ≈ 14,1 m</text>
  </g>

  <!-- ===== 3. Vzdálenost ===== -->
  <g transform="translate(515,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">🗺️</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#ca8a04">Vzdálenost na mapě</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">Souřadnice dvou bodů</text>

    <!-- Mini coordinate system -->
    <line x1="40" y1="190" x2="190" y2="190" stroke="#1e3a5f" stroke-width="1"/>
    <line x1="40" y1="190" x2="40" y2="90" stroke="#1e3a5f" stroke-width="1"/>
    <circle cx="70" cy="170" r="4" fill="#ca8a04"/>
    <text x="58" y="168" font-size="9" fill="#ca8a04" font-weight="600">A</text>
    <circle cx="170" cy="110" r="4" fill="#ca8a04"/>
    <text x="176" y="108" font-size="9" fill="#ca8a04" font-weight="600">B</text>
    <line x1="70" y1="170" x2="170" y2="110" stroke="#ca8a04" stroke-width="2" stroke-dasharray="5 3"/>
    <line x1="70" y1="170" x2="170" y2="170" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="170" y1="170" x2="170" y2="110" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="120" y="184" font-size="9" fill="#64748b">Δx</text>
    <text x="178" y="145" font-size="9" fill="#64748b">Δy</text>

    <text x="110" y="218" text-anchor="middle" font-size="11" fill="#1e3a5f">d = √(Δx² + Δy²)</text>
    <text x="110" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#ca8a04">Pythagorova věta!</text>
  </g>
</svg>
