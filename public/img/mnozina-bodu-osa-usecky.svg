<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bg)"/>
  
  <!-- Úsečka AB -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#f87171" stroke-width="4"/>
  
  <!-- Body A a B -->
  <circle cx="100" cy="200" r="7" fill="#f87171"/>
  <text x="90" y="230" fill="#f87171" font-size="18" font-weight="bold">A</text>
  
  <circle cx="400" cy="200" r="7" fill="#f87171"/>
  <text x="395" y="230" fill="#f87171" font-size="18" font-weight="bold">B</text>
  
  <!-- Střed úsečky -->
  <circle cx="250" cy="200" r="5" fill="#fbbf24"/>
  <text x="260" y="225" fill="#fbbf24" font-size="14">S</text>
  
  <!-- Osa úsečky (kolmice středem) -->
  <line x1="250" y1="40" x2="250" y2="360" stroke="#818cf8" stroke-width="4"/>
  
  <!-- Značka kolmosti -->
  <rect x="250" y="188" width="12" height="12" fill="none" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Body na ose -->
  <circle cx="250" cy="80" r="5" fill="#34d399"/>
  <text x="260" y="85" fill="#34d399" font-size="14">X₁</text>
  
  <circle cx="250" cy="140" r="5" fill="#34d399"/>
  <text x="260" y="145" fill="#34d399" font-size="14">X₂</text>
  
  <circle cx="250" cy="280" r="5" fill="#34d399"/>
  <text x="260" y="285" fill="#34d399" font-size="14">X₃</text>
  
  <circle cx="250" cy="340" r="5" fill="#34d399"/>
  <text x="260" y="345" fill="#34d399" font-size="14">X₄</text>
  
  <!-- Vzdálenosti od X₂ k A a B (čárkované) -->
  <line x1="250" y1="140" x2="100" y2="200" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="250" y1="140" x2="400" y2="200" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Titulek -->
  <text x="250" y="30" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">Osa úsečky</text>
  
  <!-- Definice -->
  <text x="250" y="385" text-anchor="middle" fill="#94a3b8" font-size="13">Množina všech bodů X, pro které platí |AX| = |BX|</text>
  
  <!-- Označení osy -->
  <text x="230" y="55" fill="#818cf8" font-size="14" font-weight="bold">o</text>
</svg>
