<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="800" height="480" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#1e293b">📊 Zlomek f(x) = 1/(x − 3)  —  jmenovatel nesmí být nula</text>

  <!-- Coordinate system -->
  <g transform="translate(60,50)">
    <!-- Grid -->
    <g stroke="#f1f5f9" stroke-width="1">
      <line x1="0" y1="190" x2="420" y2="190"/>
      <line x1="210" y1="0" x2="210" y2="380"/>
      <!-- horizontal grid -->
      <line x1="0" y1="40" x2="420" y2="40"/>
      <line x1="0" y1="90" x2="420" y2="90"/>
      <line x1="0" y1="140" x2="420" y2="140"/>
      <line x1="0" y1="240" x2="420" y2="240"/>
      <line x1="0" y1="290" x2="420" y2="290"/>
      <line x1="0" y1="340" x2="420" y2="340"/>
      <!-- vertical grid -->
      <line x1="60" y1="0" x2="60" y2="380"/>
      <line x1="110" y1="0" x2="110" y2="380"/>
      <line x1="160" y1="0" x2="160" y2="380"/>
      <line x1="260" y1="0" x2="260" y2="380"/>
      <line x1="310" y1="0" x2="310" y2="380"/>
      <line x1="360" y1="0" x2="360" y2="380"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="190" x2="420" y2="190" stroke="#475569" stroke-width="2"/>
    <line x1="210" y1="0" x2="210" y2="380" stroke="#475569" stroke-width="2"/>
    <!-- Arrows -->
    <polygon points="420,190 412,186 412,194" fill="#475569"/>
    <polygon points="210,0 206,8 214,8" fill="#475569"/>
    <text x="415" y="182" font-size="13" font-weight="700" fill="#475569">x</text>
    <text x="220" y="14" font-size="13" font-weight="700" fill="#475569">y</text>

    <!-- Tick labels x-axis -->
    <g font-size="11" fill="#64748b" text-anchor="middle">
      <text x="60" y="206">−3</text>
      <text x="110" y="206">−2</text>
      <text x="160" y="206">−1</text>
      <text x="218" y="206" font-size="10">0</text>
      <text x="260" y="206">1</text>
      <text x="310" y="206">2</text>
      <text x="360" y="206">3</text>
    </g>
    <!-- Tick labels y-axis -->
    <g font-size="11" fill="#64748b" text-anchor="end">
      <text x="204" y="44">3</text>
      <text x="204" y="94">2</text>
      <text x="204" y="144">1</text>
      <text x="204" y="244">−1</text>
      <text x="204" y="294">−2</text>
      <text x="204" y="344">−3</text>
    </g>

    <!-- Asymptote at x=3 (dashed red) -->
    <line x1="360" y1="0" x2="360" y2="380" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,5"/>

    <!-- Forbidden zone shade -->
    <rect x="350" y="0" width="20" height="380" fill="#ef4444" opacity="0.08" rx="2"/>

    <!-- Curve: left branch (x < 3) -->
    <path d="M10,182 Q60,183 110,184 Q160,185 210,190 Q260,195 310,202 Q335,215 345,240 Q350,280 352,360" 
          fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <!-- Curve: right branch (x > 3) -->
    <path d="M368,20 Q370,80 372,120 Q375,155 380,170 Q385,178 395,182 Q405,184 420,186" 
          fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>

    <!-- Asymptote label -->
    <rect x="365" y="15" width="55" height="22" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="392" y="31" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">x = 3</text>

    <!-- X mark at x=3 on axis -->
    <circle cx="360" cy="190" r="8" fill="#ffffff" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="355" y1="185" x2="365" y2="195" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="365" y1="185" x2="355" y2="195" stroke="#ef4444" stroke-width="2.5"/>

    <!-- D(f) highlight on x-axis -->
    <line x1="5" y1="193" x2="348" y2="193" stroke="#10b981" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
    <line x1="372" y1="193" x2="415" y2="193" stroke="#10b981" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Right panel: explanation -->
  <g transform="translate(510,65)">
    <!-- Formula box -->
    <rect x="0" y="0" width="270" height="55" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="135" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">f(x) = 1/(x − 3)</text>
    <text x="135" y="46" text-anchor="middle" font-size="12" fill="#3b82f6">Funkce se zlomkem</text>

    <!-- Step 1 -->
    <rect x="0" y="72" width="270" height="46" rx="10" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
    <text x="15" y="94" font-size="13" font-weight="700" fill="#d97706">⚠ Podmínka:</text>
    <text x="15" y="110" font-size="14" font-weight="600" fill="#92400e">x − 3 ≠ 0  →  x ≠ 3</text>

    <!-- Step 2 -->
    <rect x="0" y="132" width="270" height="46" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="15" y="154" font-size="13" font-weight="700" fill="#dc2626">⛔ Zakázaná hodnota:</text>
    <text x="15" y="170" font-size="14" font-weight="600" fill="#dc2626">x = 3  (dělení nulou!)</text>

    <!-- Why -->
    <rect x="0" y="192" width="270" height="80" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="135" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Proč? Dosadíme x = 3:</text>
    <text x="135" y="236" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">f(3) = 1/(3−3) = 1/0</text>
    <text x="135" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">= NESMYSL! 💥</text>

    <!-- Result -->
    <rect x="0" y="290" width="270" height="55" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
    <text x="135" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Výsledek:</text>
    <text x="135" y="336" text-anchor="middle" font-size="20" font-weight="800" fill="#059669">D(f) = ℝ ∖ {3}</text>

    <!-- Number line mini -->
    <g transform="translate(0,360)">
      <text x="0" y="12" font-size="12" font-weight="600" fill="#475569">Číselná osa:</text>
      <line x1="0" y1="35" x2="270" y2="35" stroke="#475569" stroke-width="2"/>
      <polygon points="270,35 264,31 264,39" fill="#475569"/>
      <!-- Highlight -->
      <line x1="5" y1="35" x2="175" y2="35" stroke="#10b981" stroke-width="6" opacity="0.4" stroke-linecap="round"/>
      <line x1="195" y1="35" x2="265" y2="35" stroke="#10b981" stroke-width="6" opacity="0.4" stroke-linecap="round"/>
      <!-- Excluded point -->
      <circle cx="185" cy="35" r="6" fill="#ffffff" stroke="#ef4444" stroke-width="2.5"/>
      <text x="185" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">3</text>
      <!-- Tick marks -->
      <g font-size="10" fill="#94a3b8" text-anchor="middle">
        <line x1="50" y1="31" x2="50" y2="39" stroke="#94a3b8" stroke-width="1"/>
        <text x="50" y="55">0</text>
        <line x1="135" y1="31" x2="135" y2="39" stroke="#94a3b8" stroke-width="1"/>
        <text x="135" y="55">2</text>
      </g>
    </g>
  </g>
</svg>
