<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Pozadí -->
  <rect width="800" height="300" fill="#f8fafc"/>
  
  <!-- Nadpis -->
  <text x="400" y="30" fill="#333" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Parametr align – zarovnání textu</text>
  
  <!-- LEFT -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="#1a1a2e" stroke="#e74c3c" stroke-width="3"/>
    <text x="110" y="25" fill="#e74c3c" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">align="left"</text>
    
    <!-- Plátno -->
    <rect x="20" y="40" width="180" height="100" rx="4" fill="#0f3460"/>
    
    <!-- Pozice želvy -->
    <circle cx="110" cy="90" r="6" fill="#2ecc71"/>
    <polygon points="110,84 104,96 116,96" fill="#2ecc71"/>
    
    <!-- Text jde DOPRAVA od želvy -->
    <text x="110" y="88" fill="#fff" font-family="Arial" font-size="14">Ahoj světe!</text>
    
    <!-- Šipka -->
    <line x1="115" y1="105" x2="180" y2="105" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
    
    <text x="110" y="160" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">Text začíná NA pozici želvy</text>
    <text x="110" y="178" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">a pokračuje DOPRAVA</text>
  </g>
  
  <!-- CENTER -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="#1a1a2e" stroke="#2ecc71" stroke-width="3"/>
    <text x="110" y="25" fill="#2ecc71" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">align="center"</text>
    
    <!-- Plátno -->
    <rect x="20" y="40" width="180" height="100" rx="4" fill="#0f3460"/>
    
    <!-- Pozice želvy -->
    <circle cx="110" cy="90" r="6" fill="#2ecc71"/>
    <polygon points="110,84 104,96 116,96" fill="#2ecc71"/>
    
    <!-- Text je vycentrovaný -->
    <text x="110" y="88" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Ahoj světe!</text>
    
    <!-- Šipky obě strany -->
    <line x1="60" y1="105" x2="105" y2="105" stroke="#2ecc71" stroke-width="2"/>
    <line x1="115" y1="105" x2="160" y2="105" stroke="#2ecc71" stroke-width="2"/>
    <polygon points="60,105 67,102 67,108" fill="#2ecc71"/>
    <polygon points="160,105 153,102 153,108" fill="#2ecc71"/>
    
    <text x="110" y="160" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">Text je VYCENTROVANÝ</text>
    <text x="110" y="178" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">kolem pozice želvy</text>
  </g>
  
  <!-- RIGHT -->
  <g transform="translate(530, 60)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="3"/>
    <text x="110" y="25" fill="#3498db" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">align="right"</text>
    
    <!-- Plátno -->
    <rect x="20" y="40" width="180" height="100" rx="4" fill="#0f3460"/>
    
    <!-- Pozice želvy -->
    <circle cx="110" cy="90" r="6" fill="#2ecc71"/>
    <polygon points="110,84 104,96 116,96" fill="#2ecc71"/>
    
    <!-- Text jde DOLEVA od želvy -->
    <text x="110" y="88" fill="#fff" font-family="Arial" font-size="14" text-anchor="end">Ahoj světe!</text>
    
    <!-- Šipka -->
    <line x1="40" y1="105" x2="105" y2="105" stroke="#3498db" stroke-width="2"/>
    <polygon points="40,105 47,102 47,108" fill="#3498db"/>
    
    <text x="110" y="160" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">Text KONČÍ na pozici želvy</text>
    <text x="110" y="178" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">a jde DOLEVA</text>
  </g>
  
  <!-- Legenda -->
  <g transform="translate(300, 275)">
    <circle cx="0" cy="0" r="5" fill="#2ecc71"/>
    <text x="15" y="4" fill="#333" font-family="Arial" font-size="11">= pozice želvy (t.goto(x, y))</text>
  </g>
</svg>