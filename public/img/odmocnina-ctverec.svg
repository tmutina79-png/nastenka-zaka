<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="system-ui, sans-serif">
  <text x="360" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Co je odmocnina? Hledáme stranu čtverce!</text>

  <!-- ===== Square 1: area=4 ===== -->
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="100" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <!-- grid 2×2 -->
    <line x1="50" y1="0" x2="50" y2="100" stroke="#2563eb" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#2563eb" stroke-width="0.8" opacity="0.4"/>
    <text x="50" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#2563eb">4</text>
    <text x="50" y="78" text-anchor="middle" font-size="11" fill="#1e3a5f">čtverečků</text>
    <!-- side label -->
    <text x="50" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">strana = <tspan font-weight="800" fill="#2563eb">2</tspan></text>
    <text x="50" y="145" text-anchor="middle" font-size="12" fill="#64748b">√4 = 2</text>
    <!-- side arrow -->
    <line x1="0" y1="108" x2="100" y2="108" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrSq)"/>
    <line x1="100" y1="108" x2="0" y2="108" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrSq)"/>
  </g>

  <!-- ===== Square 2: area=9 ===== -->
  <g transform="translate(195,50)">
    <rect x="0" y="0" width="120" height="120" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <!-- grid 3×3 -->
    <line x1="40" y1="0" x2="40" y2="120" stroke="#16a34a" stroke-width="0.8" opacity="0.4"/>
    <line x1="80" y1="0" x2="80" y2="120" stroke="#16a34a" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#16a34a" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="80" x2="120" y2="80" stroke="#16a34a" stroke-width="0.8" opacity="0.4"/>
    <text x="60" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#16a34a">9</text>
    <text x="60" y="88" text-anchor="middle" font-size="11" fill="#1e3a5f">čtverečků</text>
    <text x="60" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">strana = <tspan font-weight="800" fill="#16a34a">3</tspan></text>
    <text x="60" y="168" text-anchor="middle" font-size="12" fill="#64748b">√9 = 3</text>
  </g>

  <!-- ===== Square 3: area=16 ===== -->
  <g transform="translate(385,50)">
    <rect x="0" y="0" width="140" height="140" rx="4" fill="#fef3c7" stroke="#ca8a04" stroke-width="2.5"/>
    <!-- grid 4×4 -->
    <line x1="35" y1="0" x2="35" y2="140" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="0" x2="70" y2="140" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <line x1="105" y1="0" x2="105" y2="140" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="35" x2="140" y2="35" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="70" x2="140" y2="70" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="105" x2="140" y2="105" stroke="#ca8a04" stroke-width="0.8" opacity="0.4"/>
    <text x="70" y="78" text-anchor="middle" font-size="22" font-weight="700" fill="#ca8a04">16</text>
    <text x="70" y="98" text-anchor="middle" font-size="11" fill="#1e3a5f">čtverečků</text>
    <text x="70" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">strana = <tspan font-weight="800" fill="#ca8a04">4</tspan></text>
    <text x="70" y="190" text-anchor="middle" font-size="12" fill="#64748b">√16 = 4</text>
  </g>

  <!-- ===== Square 4: area=25 ===== -->
  <g transform="translate(575,50)">
    <rect x="0" y="0" width="120" height="120" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="2.5"/>
    <!-- grid 5×5 -->
    <line x1="24" y1="0" x2="24" y2="120" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="48" y1="0" x2="48" y2="120" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="72" y1="0" x2="72" y2="120" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="96" y1="0" x2="96" y2="120" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="24" x2="120" y2="24" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="48" x2="120" y2="48" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="72" x2="120" y2="72" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="96" x2="120" y2="96" stroke="#db2777" stroke-width="0.6" opacity="0.4"/>
    <text x="60" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#db2777">25</text>
    <text x="60" y="88" text-anchor="middle" font-size="11" fill="#1e3a5f">čtverečků</text>
    <text x="60" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">strana = <tspan font-weight="800" fill="#db2777">5</tspan></text>
    <text x="60" y="168" text-anchor="middle" font-size="12" fill="#64748b">√25 = 5</text>
  </g>

  <!-- Bottom explanation -->
  <rect x="100" y="260" width="520" height="60" rx="12" fill="#1e3a5f" opacity="0.06"/>
  <text x="360" y="286" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Odmocnina = opak umocňování</text>
  <text x="360" y="308" text-anchor="middle" font-size="13" fill="#1e3a5f">Znám obsah čtverce (S) → hledám délku strany (a).   √S = a   protože   a² = S</text>

  <defs>
    <marker id="arrSq" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#2563eb"/></marker>
  </defs>
</svg>
