<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Animated bars preview -->
  <g transform="translate(30, 35)">
    <!-- Worker A bar -->
    <rect x="0" y="0" width="180" height="20" rx="4" fill="#334155"/>
    <rect x="0" y="0" width="120" height="20" rx="4" fill="url(#gA)" opacity="0.9"/>
    <text x="8" y="14" font-family="system-ui" font-size="9" font-weight="600" fill="white">Pracovník A</text>
    
    <!-- Worker B bar -->
    <rect x="0" y="30" width="180" height="20" rx="4" fill="#334155"/>
    <rect x="0" y="30" width="180" height="20" rx="4" fill="url(#gB)" opacity="0.9"/>
    <text x="8" y="44" font-family="system-ui" font-size="9" font-weight="600" fill="white">Pracovník B</text>
    
    <!-- Combined bar -->
    <rect x="0" y="65" width="260" height="24" rx="5" fill="#fbbf24" opacity="0.3"/>
    <rect x="0" y="65" width="200" height="24" rx="5" fill="url(#playGrad)" opacity="0.9"/>
    <text x="8" y="81" font-family="system-ui" font-size="10" font-weight="700" fill="white">Společně</text>
  </g>
  
  <!-- Formula -->
  <text x="245" y="55" font-family="system-ui" font-size="11" font-weight="600" fill="#94a3b8">1/t₁ + 1/t₂</text>
  <text x="245" y="72" font-family="system-ui" font-size="9" fill="#64748b">= 1/t</text>
  
  <!-- Play button circle -->
  <circle cx="160" cy="130" r="32" fill="url(#playGrad)" opacity="0.95"/>
  <circle cx="160" cy="130" r="32" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.5"/>
  
  <!-- Play triangle -->
  <path d="M152 116 L152 144 L176 130 Z" fill="white"/>
  
  <!-- Video indicator strip -->
  <rect x="0" y="175" width="320" height="25" rx="0" fill="#0f172a"/>
  <rect x="0" y="175" width="320" height="1" fill="#334155"/>
  
  <!-- Film icon -->
  <g transform="translate(12, 181)">
    <rect x="0" y="0" width="14" height="12" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <rect x="1.5" y="2" width="3" height="3" fill="#64748b"/>
    <rect x="5.5" y="2" width="3" height="3" fill="#64748b"/>
    <rect x="9.5" y="2" width="3" height="3" fill="#64748b"/>
    <rect x="1.5" y="7" width="3" height="3" fill="#64748b"/>
    <rect x="5.5" y="7" width="3" height="3" fill="#64748b"/>
    <rect x="9.5" y="7" width="3" height="3" fill="#64748b"/>
  </g>
  
  <!-- Video label -->
  <text x="32" y="191" font-family="system-ui" font-size="11" font-weight="600" fill="#e2e8f0">▶ Animovaná vizualizace principu</text>
  
  <!-- Duration badge -->
  <rect x="265" y="180" width="45" height="16" rx="4" fill="#334155"/>
  <text x="287" y="191" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#94a3b8">1:45</text>
</svg>
