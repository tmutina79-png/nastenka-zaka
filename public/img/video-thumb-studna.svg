<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="wellGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="8"/>
  
  <!-- Ground -->
  <rect x="0" y="120" width="320" height="60" rx="0" fill="#1c3a2a" opacity="0.3"/>
  
  <!-- House A -->
  <rect x="52" y="95" width="36" height="28" rx="3" fill="#fb923c"/>
  <polygon points="48,95 70,72 92,95" fill="#fb923c"/>
  <rect x="64" y="103" width="10" height="17" rx="1" fill="rgba(0,0,0,0.3)"/>
  <text x="70" y="140" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">A</text>
  
  <!-- House B -->
  <rect x="232" y="95" width="36" height="28" rx="3" fill="#f472b6"/>
  <polygon points="228,95 250,72 272,95" fill="#f472b6"/>
  <rect x="244" y="103" width="10" height="17" rx="1" fill="rgba(0,0,0,0.3)"/>
  <text x="250" y="140" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="bold">B</text>
  
  <!-- Segment AB (dashed) -->
  <line x1="70" y1="110" x2="250" y2="110" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  
  <!-- Osa úsečky (perpendicular bisector) -->
  <line x1="160" y1="30" x2="160" y2="150" stroke="#34d399" stroke-width="3"/>
  
  <!-- Midpoint S -->
  <circle cx="160" cy="110" r="4" fill="#fbbf24"/>
  <text x="170" y="118" fill="#fbbf24" font-size="9" font-weight="bold">S</text>
  
  <!-- Right angle mark -->
  <rect x="160" y="100" width="8" height="8" fill="none" stroke="#94a3b8" stroke-width="1"/>
  
  <!-- Well glow -->
  <circle cx="160" cy="65" r="25" fill="url(#wellGlow)"/>
  
  <!-- Well -->
  <circle cx="160" cy="65" r="8" fill="#38bdf8" opacity="0.8"/>
  <circle cx="160" cy="65" r="11" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <!-- Well roof -->
  <line x1="152" y1="54" x2="152" y2="44" stroke="#78716c" stroke-width="2"/>
  <line x1="168" y1="54" x2="168" y2="44" stroke="#78716c" stroke-width="2"/>
  <polygon points="148,44 160,36 172,44" fill="#92400e" stroke="#a16207" stroke-width="1"/>
  
  <!-- Distance lines -->
  <line x1="160" y1="70" x2="70" y2="100" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="160" y1="70" x2="250" y2="100" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  
  <!-- d₁ = d₂ label -->
  <rect x="120" y="20" width="80" height="18" rx="5" fill="rgba(52,211,153,0.2)"/>
  <text x="160" y="32" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">d₁ = d₂</text>
  
  <!-- Osa label -->
  <text x="145" y="148" fill="#34d399" font-size="9" font-weight="bold">o</text>
  
  <!-- Play button -->
  <circle cx="160" cy="85" r="16" fill="rgba(0,0,0,0.45)"/>
  <polygon points="156,77 156,93 168,85" fill="white" opacity="0.9"/>
  
  <!-- Title -->
  <text x="160" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">🏠 Umístění studny – osa úsečky</text>
</svg>
