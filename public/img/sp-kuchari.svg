<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background - kitchen -->
  <rect width="400" height="200" fill="#fef3c7"/>
  
  <!-- Counter -->
  <rect x="20" y="130" width="360" height="15" fill="#78350f"/>
  <rect x="20" y="145" width="360" height="55" fill="#92400e"/>
  
  <!-- Stove -->
  <rect x="280" y="90" width="80" height="40" fill="#374151"/>
  <circle cx="300" cy="105" r="10" fill="#ef4444"/>
  <circle cx="340" cy="105" r="10" fill="#ef4444"/>
  
  <!-- Pots on stove -->
  <ellipse cx="300" cy="95" rx="12" ry="5" fill="#64748b"/>
  <ellipse cx="340" cy="95" rx="12" ry="5" fill="#64748b"/>
  
  <!-- Chef 1 (stays) -->
  <circle cx="70" cy="75" r="18" fill="#22c55e"/>
  <rect x="58" y="93" width="24" height="35" fill="#16a34a"/>
  <rect x="55" y="55" width="30" height="10" fill="white"/>
  <text x="70" y="82" text-anchor="middle" font-size="10" fill="white" font-weight="bold">K1</text>
  
  <!-- Chef 2 (stays) -->
  <circle cx="140" cy="75" r="18" fill="#22c55e"/>
  <rect x="128" y="93" width="24" height="35" fill="#16a34a"/>
  <rect x="125" y="55" width="30" height="10" fill="white"/>
  <text x="140" y="82" text-anchor="middle" font-size="10" fill="white" font-weight="bold">K2</text>
  
  <!-- Chef 3 (leaves) - grayed out with arrow -->
  <circle cx="210" cy="75" r="18" fill="#d1d5db"/>
  <rect x="198" y="93" width="24" height="35" fill="#9ca3af"/>
  <rect x="195" y="55" width="30" height="10" fill="#e5e7eb"/>
  <text x="210" y="82" text-anchor="middle" font-size="10" fill="#6b7280" font-weight="bold">K3</text>
  
  <!-- Arrow showing chef leaving -->
  <path d="M230 75 Q250 50 270 70" stroke="#ef4444" stroke-width="2" fill="none"/>
  <polygon points="268,65 275,72 265,72" fill="#ef4444"/>
  <text x="260" y="50" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">odešel</text>
  
  <!-- Food/plates on counter -->
  <ellipse cx="80" cy="125" rx="15" ry="8" fill="#fcd34d"/>
  <ellipse cx="150" cy="125" rx="15" ry="8" fill="#fcd34d"/>
  <ellipse cx="220" cy="125" rx="15" ry="8" fill="#fcd34d"/>
  
  <!-- Timeline info -->
  <rect x="30" y="175" width="50" height="20" fill="#3b82f6" rx="3"/>
  <text x="55" y="188" text-anchor="middle" font-size="8" fill="white" font-weight="bold">2h: 3 kuch.</text>
  
  <rect x="90" y="175" width="70" height="20" fill="#f97316" rx="3"/>
  <text x="125" y="188" text-anchor="middle" font-size="8" fill="white" font-weight="bold">6h: 2 kuch.</text>
  
  <!-- Result -->
  <rect x="320" y="30" width="70" height="50" fill="#7c3aed" rx="5"/>
  <text x="355" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Celkem:</text>
  <text x="355" y="68" text-anchor="middle" font-size="14" fill="white" font-weight="bold">8 hodin</text>
  
  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-size="13" fill="#92400e" font-weight="bold">Příklad 6: Tři kuchaři (jeden odejde)</text>
</svg>
