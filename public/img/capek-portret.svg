<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="18" fill="url(#bg1)" stroke="#86efac" stroke-width="2"/>
  <!-- Desk -->
  <rect x="30" y="230" width="440" height="100" rx="8" fill="#d4a373" opacity="0.4"/>
  <rect x="30" y="225" width="440" height="10" rx="4" fill="#b08968"/>
  <!-- Typewriter -->
  <rect x="170" y="175" width="160" height="55" rx="10" fill="#374151"/>
  <rect x="180" y="185" width="140" height="25" rx="4" fill="#f3f4f6"/>
  <!-- Keys -->
  <circle cx="200" cy="218" r="5" fill="#6b7280"/>
  <circle cx="215" cy="218" r="5" fill="#6b7280"/>
  <circle cx="230" cy="218" r="5" fill="#6b7280"/>
  <circle cx="245" cy="218" r="5" fill="#6b7280"/>
  <circle cx="260" cy="218" r="5" fill="#6b7280"/>
  <circle cx="275" cy="218" r="5" fill="#6b7280"/>
  <circle cx="290" cy="218" r="5" fill="#6b7280"/>
  <circle cx="305" cy="218" r="5" fill="#6b7280"/>
  <!-- Paper in typewriter -->
  <rect x="200" y="140" width="100" height="50" rx="2" fill="#fff" stroke="#d1d5db"/>
  <line x1="210" y1="152" x2="280" y2="152" stroke="#9ca3af" stroke-width="1"/>
  <line x1="210" y1="160" x2="270" y2="160" stroke="#9ca3af" stroke-width="1"/>
  <line x1="210" y1="168" x2="260" y2="168" stroke="#9ca3af" stroke-width="1"/>
  <!-- Books stack -->
  <rect x="60" y="190" width="80" height="15" rx="3" fill="#3b82f6"/>
  <rect x="55" y="178" width="85" height="15" rx="3" fill="#ef4444"/>
  <rect x="63" y="166" width="75" height="15" rx="3" fill="#f59e0b"/>
  <text x="75" y="200" font-family="serif" font-size="8" fill="white" font-weight="bold">R.U.R.</text>
  <text x="65" y="188" font-family="serif" font-size="8" fill="white" font-weight="bold">Válka s mloky</text>
  <text x="72" y="176" font-family="serif" font-size="8" fill="white" font-weight="bold">Krakatit</text>
  <!-- Glasses -->
  <circle cx="380" cy="195" r="18" fill="none" stroke="#374151" stroke-width="3"/>
  <circle cx="420" cy="195" r="18" fill="none" stroke="#374151" stroke-width="3"/>
  <line x1="398" y1="195" x2="402" y2="195" stroke="#374151" stroke-width="3"/>
  <line x1="362" y1="195" x2="350" y2="188" stroke="#374151" stroke-width="3"/>
  <line x1="438" y1="195" x2="450" y2="188" stroke="#374151" stroke-width="3"/>
  <!-- Pen -->
  <line x1="380" y1="225" x2="410" y2="260" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <polygon points="410,260 405,270 415,265" fill="#374151"/>
  <!-- Stars / sparkle -->
  <text x="130" y="60" font-size="28">✨</text>
  <text x="350" y="80" font-size="24">🖊️</text>
  <!-- Title -->
  <text x="250" y="50" font-family="Georgia, serif" font-size="26" fill="#166534" text-anchor="middle" font-weight="bold">Karel Čapek</text>
  <text x="250" y="75" font-family="sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">(1890 – 1938)</text>
  <!-- Cat (Čapek loved cats) -->
  <g transform="translate(415, 240)">
    <ellipse cx="15" cy="20" rx="12" ry="16" fill="#6b7280"/>
    <circle cx="15" cy="5" r="10" fill="#6b7280"/>
    <polygon points="7,-4 5,-14 12,-6" fill="#6b7280"/>
    <polygon points="23,-4 25,-14 18,-6" fill="#6b7280"/>
    <circle cx="11" cy="3" r="2.5" fill="#fef08a"/>
    <circle cx="19" cy="3" r="2.5" fill="#fef08a"/>
    <circle cx="11" cy="3.5" r="1.2" fill="#111"/>
    <circle cx="19" cy="3.5" r="1.2" fill="#111"/>
    <ellipse cx="15" cy="8" rx="2" ry="1.2" fill="#f9a8d4"/>
    <!-- Tail -->
    <path d="M27 20 Q40 10 35 30" stroke="#6b7280" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Quote -->
  <text x="250" y="320" font-family="Georgia, serif" font-size="12" fill="#6b7280" text-anchor="middle" font-style="italic">„Slovo ‚robot' vymyslel můj bratr Josef."</text>
</svg>
