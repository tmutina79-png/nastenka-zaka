<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" rx="12" fill="url(#bgP)"/>

  <!-- Garden ground -->
  <rect x="20" y="60" width="360" height="130" rx="8" fill="#1a3a1a"/>

  <!-- Path (přímka p) -->
  <line x1="30" y1="125" x2="370" y2="125" stroke="#ca8a04" stroke-width="5" stroke-dasharray="12,6"/>
  <text x="22" y="120" font-size="11" font-weight="700" fill="#fbbf24">p</text>

  <!-- Fence p₁ (above) -->
  <line x1="40" y1="85" x2="360" y2="85" stroke="#818cf8" stroke-width="3"/>
  <!-- Fence posts -->
  <rect x="60" y="75" width="4" height="20" fill="#78350f"/>
  <rect x="120" y="75" width="4" height="20" fill="#78350f"/>
  <rect x="180" y="75" width="4" height="20" fill="#78350f"/>
  <rect x="240" y="75" width="4" height="20" fill="#78350f"/>
  <rect x="300" y="75" width="4" height="20" fill="#78350f"/>
  <text x="368" y="89" font-size="11" font-weight="700" fill="#818cf8">p₁</text>

  <!-- Fence p₂ (below) -->
  <line x1="40" y1="165" x2="360" y2="165" stroke="#818cf8" stroke-width="3"/>
  <rect x="60" y="155" width="4" height="20" fill="#78350f"/>
  <rect x="120" y="155" width="4" height="20" fill="#78350f"/>
  <rect x="180" y="155" width="4" height="20" fill="#78350f"/>
  <rect x="240" y="155" width="4" height="20" fill="#78350f"/>
  <rect x="300" y="155" width="4" height="20" fill="#78350f"/>
  <text x="368" y="169" font-size="11" font-weight="700" fill="#818cf8">p₂</text>

  <!-- Distance d -->
  <line x1="80" y1="85" x2="80" y2="125" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="108" font-size="11" font-weight="700" fill="#34d399">d</text>
  <line x1="80" y1="125" x2="80" y2="165" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="148" font-size="11" font-weight="700" fill="#34d399">d</text>

  <!-- Flowers -->
  <circle cx="160" cy="72" r="5" fill="#f472b6"/>
  <circle cx="250" cy="73" r="4" fill="#c084fc"/>
  <circle cx="200" cy="178" r="5" fill="#f472b6"/>
  <circle cx="310" cy="177" r="4" fill="#c084fc"/>

  <!-- Play button -->
  <circle cx="200" cy="125" r="28" fill="rgba(0,0,0,0.45)"/>
  <path d="M192,111 L192,139 L215,125 Z" fill="white"/>

  <!-- Title -->
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">🌻 Plot kolem záhonu – rovnoběžky</text>
</svg>
