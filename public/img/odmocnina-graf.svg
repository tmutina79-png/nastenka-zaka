<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrSqG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1e3a5f"/></marker>
  </defs>

  <text x="260" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">Graf funkce y = тИЪx</text>

  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="0.7">
    <line x1="60" y1="60" x2="60" y2="380"/><line x1="108" y1="60" x2="108" y2="380"/>
    <line x1="156" y1="60" x2="156" y2="380"/><line x1="204" y1="60" x2="204" y2="380"/>
    <line x1="252" y1="60" x2="252" y2="380"/><line x1="300" y1="60" x2="300" y2="380"/>
    <line x1="348" y1="60" x2="348" y2="380"/><line x1="396" y1="60" x2="396" y2="380"/>
    <line x1="444" y1="60" x2="444" y2="380"/><line x1="492" y1="60" x2="492" y2="380"/>
    <line x1="40" y1="380" x2="500" y2="380"/><line x1="40" y1="300" x2="500" y2="300"/>
    <line x1="40" y1="220" x2="500" y2="220"/><line x1="40" y1="140" x2="500" y2="140"/>
    <line x1="40" y1="60" x2="500" y2="60"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="380" x2="500" y2="380" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrSqG)"/>
  <line x1="60" y1="380" x2="60" y2="42" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrSqG)"/>
  <text x="505" y="394" font-size="14" font-weight="600" fill="#1e3a5f">x</text>
  <text x="45" y="44" font-size="14" font-weight="600" fill="#1e3a5f">y</text>
  <text x="52" y="396" text-anchor="end" font-size="11" fill="#64748b">0</text>

  <!-- X labels (step=48px тЖТ 1 unit on x) scale: 48px = 1 unit x -->
  <!-- Actually let's use: 1 unit x = 48px, 1 unit y = 80px for nice curve -->
  <!-- x: 0тЖТ60, 1тЖТ108, 2тЖТ156, 4тЖТ252, 9тЖТ492 -->
  <!-- y: 0тЖТ380, 1тЖТ300, 2тЖТ220, 3тЖТ140, 4тЖТ60 -->
  <text x="108" y="398" text-anchor="middle" font-size="11" fill="#64748b">1</text>
  <text x="156" y="398" text-anchor="middle" font-size="11" fill="#64748b">2</text>
  <text x="204" y="398" text-anchor="middle" font-size="11" fill="#64748b">3</text>
  <text x="252" y="398" text-anchor="middle" font-size="11" fill="#64748b">4</text>
  <text x="300" y="398" text-anchor="middle" font-size="11" fill="#64748b">5</text>
  <text x="348" y="398" text-anchor="middle" font-size="11" fill="#64748b">6</text>
  <text x="396" y="398" text-anchor="middle" font-size="11" fill="#64748b">7</text>
  <text x="444" y="398" text-anchor="middle" font-size="11" fill="#64748b">8</text>
  <text x="492" y="398" text-anchor="middle" font-size="11" fill="#64748b">9</text>

  <text x="50" y="304" text-anchor="end" font-size="11" fill="#64748b">1</text>
  <text x="50" y="224" text-anchor="end" font-size="11" fill="#64748b">2</text>
  <text x="50" y="144" text-anchor="end" font-size="11" fill="#64748b">3</text>
  <text x="50" y="64" text-anchor="end" font-size="11" fill="#64748b">4</text>

  <!-- Curve y=тИЪx тАФ precise points: xтЖТpx_x=60+48*x, y=тИЪxтЖТpx_y=380-80*тИЪx -->
  <!-- x=0тЖТ(60,380) x=0.25тЖТ(72,340) x=0.5тЖТ(84,323) x=1тЖТ(108,300) x=1.5тЖТ(132,282)
       x=2тЖТ(156,267) x=2.5тЖТ(180,254) x=3тЖТ(204,242) x=4тЖТ(252,220) x=5тЖТ(300,201)
       x=6тЖТ(348,184) x=7тЖТ(396,168) x=8тЖТ(444,154) x=9тЖТ(492,140) -->
  <polyline
    points="60,380 72,340 84,323 96,311 108,300 120,291 132,282 144,275 156,267 168,261 180,254 192,248 204,242 216,237 228,232 240,226 252,220 264,215 276,210 288,206 300,201 312,197 324,193 336,189 348,184 360,181 372,177 384,174 396,168 408,165 420,162 432,159 444,154 456,151 468,148 480,145 492,140"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Label -->
  <text x="480" y="128" font-size="14" font-weight="700" fill="#2563eb">y = тИЪx</text>

  <!-- Highlighted perfect-square points -->
  <circle cx="60" cy="380" r="5" fill="#1e3a5f"/>
  <circle cx="108" cy="300" r="5" fill="#2563eb"/>
  <circle cx="252" cy="220" r="5" fill="#2563eb"/>
  <circle cx="492" cy="140" r="5" fill="#2563eb"/>

  <!-- Annotations for key points -->
  <rect x="112" y="284" width="72" height="20" rx="4" fill="white" stroke="#2563eb" stroke-width="1"/>
  <text x="148" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">[1, 1]</text>

  <rect x="256" y="204" width="72" height="20" rx="4" fill="white" stroke="#2563eb" stroke-width="1"/>
  <text x="292" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">[4, 2]</text>

  <rect x="440" y="124" width="72" height="20" rx="4" fill="white" stroke="#2563eb" stroke-width="1"/>
  <text x="476" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">[9, 3]</text>

  <!-- Dashed lines for [4,2] -->
  <line x1="252" y1="380" x2="252" y2="220" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 3" opacity="0.4"/>
  <line x1="60" y1="220" x2="252" y2="220" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 3" opacity="0.4"/>

  <!-- Note -->
  <text x="260" y="365" font-size="11" fill="#64748b" font-style="italic">K┼Щivka za─Н├нn├б v [0, 0] a roste st├бle pomaleji</text>
</svg>
