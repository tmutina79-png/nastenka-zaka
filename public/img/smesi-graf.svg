<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400">
  <rect width="520" height="400" rx="16" fill="#f8fafc"/>
  <text x="260" y="28" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Úsečkový diagram – vizualizace směsi</text>

  <!-- Number line -->
  <line x1="40" y1="100" x2="480" y2="100" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Ticks and labels (0% to 100%) -->
  <line x1="40" y1="92" x2="40" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="40" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">0 %</text>

  <line x1="128" y1="92" x2="128" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="128" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">20 %</text>

  <line x1="216" y1="92" x2="216" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="216" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">40 %</text>

  <line x1="260" y1="92" x2="260" y2="108" stroke="#cbd5e1" stroke-width="1"/>
  <text x="260" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#cbd5e1">50 %</text>

  <line x1="348" y1="92" x2="348" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="348" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">70 %</text>

  <line x1="480" y1="92" x2="480" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="124" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">100 %</text>

  <!-- Roztok A marker at 20% -->
  <circle cx="128" cy="70" r="16" fill="#6366f1"/>
  <text x="128" y="74" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">A</text>
  <text x="128" y="54" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">2 litry</text>

  <!-- Roztok B marker at 70% -->
  <circle cx="348" cy="70" r="16" fill="#10b981"/>
  <text x="348" y="74" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">B</text>
  <text x="348" y="54" text-anchor="middle" font-family="system-ui" font-size="10" fill="#10b981">3 litry</text>

  <!-- Result marker at 50% -->
  <circle cx="260" cy="70" r="16" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="74" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">S</text>

  <!-- Arrows from A and B to S -->
  <line x1="145" y1="70" x2="242" y2="70" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="331" y1="70" x2="278" y2="70" stroke="#10b981" stroke-width="1.5"/>

  <!-- Distance labels -->
  <line x1="128" y1="145" x2="260" y2="145" stroke="#6366f1" stroke-width="1.5"/>
  <text x="194" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6366f1">vzdálenost = 30</text>

  <line x1="260" y1="145" x2="348" y2="145" stroke="#10b981" stroke-width="1.5"/>
  <text x="304" y="162" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#10b981">vzdálenost = 20</text>

  <!-- Cross rule explanation -->
  <rect x="30" y="185" width="460" height="44" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="260" y="205" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#92400e">Křížové pravidlo: vzdálenosti jsou v obráceném poměru objemů!</text>
  <text x="260" y="221" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b45309">V₁ : V₂ = |c₂ − c| : |c − c₁| = 20 : 30 = 2 : 3 ✓</text>

  <!-- Table visualization -->
  <text x="260" y="260" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#1e293b">Tabulková metoda</text>

  <!-- Table header -->
  <rect x="60" y="272" width="400" height="28" rx="6" fill="#f1f5f9"/>
  <text x="140" y="291" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#475569">Roztok</text>
  <text x="240" y="291" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#475569">Objem (V)</text>
  <text x="340" y="291" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#475569">Konc. (c)</text>
  <text x="420" y="291" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#475569">Čistá l. (m)</text>

  <!-- Row A -->
  <line x1="60" y1="300" x2="460" y2="300" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1" font-weight="600">A</text>
  <text x="240" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">2</text>
  <text x="340" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">0,20</text>
  <text x="420" y="318" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">0,40</text>

  <!-- Row B -->
  <line x1="60" y1="326" x2="460" y2="326" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#10b981" font-weight="600">B</text>
  <text x="240" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">3</text>
  <text x="340" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">0,70</text>
  <text x="420" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">2,10</text>

  <!-- Row Směs -->
  <line x1="60" y1="352" x2="460" y2="352" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="356" width="400" height="24" rx="4" fill="#fffbeb"/>
  <text x="140" y="372" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f59e0b" font-weight="700">Směs</text>
  <text x="240" y="372" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#92400e">5</text>
  <text x="340" y="372" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#92400e">0,50</text>
  <text x="420" y="372" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#92400e">2,50</text>
</svg>