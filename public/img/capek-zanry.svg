<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="560" height="300" rx="18" fill="url(#bg5)" stroke="#86efac" stroke-width="2"/>
  <text x="280" y="35" font-family="Georgia, serif" font-size="18" fill="#166534" text-anchor="middle" font-weight="bold">🎭 Žánry a literární styly Karla Čapka</text>

  <!-- Pragmatism / Relativism -->
  <rect x="30" y="55" width="155" height="110" rx="14" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="107" y="80" font-size="30" text-anchor="middle">🧠</text>
  <text x="107" y="100" font-family="sans-serif" font-size="11" fill="#166534" text-anchor="middle" font-weight="bold">Pragmatismus</text>
  <text x="107" y="115" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Pravda je relativní —</text>
  <text x="107" y="128" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">každý ji vidí jinak.</text>
  <text x="107" y="145" font-family="sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle" font-style="italic">Hordubal, Povětroň, Obyčejný život</text>
  <text x="107" y="158" font-family="sans-serif" font-size="8" fill="#22c55e" text-anchor="middle" font-weight="bold">→ noetická trilogie</text>

  <!-- Sci-fi / Utopie -->
  <rect x="202" y="55" width="155" height="110" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="80" font-size="30" text-anchor="middle">🚀</text>
  <text x="280" y="100" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">Sci-fi / Utopie</text>
  <text x="280" y="115" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Technika může být</text>
  <text x="280" y="128" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">požehnání i prokletí.</text>
  <text x="280" y="145" font-family="sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle" font-style="italic">R.U.R., Krakatit, Válka s mloky</text>
  <text x="280" y="158" font-family="sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle" font-weight="bold">→ utopický román</text>

  <!-- Drama -->
  <rect x="374" y="55" width="155" height="110" rx="14" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  <text x="452" y="80" font-size="30" text-anchor="middle">🎭</text>
  <text x="452" y="100" font-family="sans-serif" font-size="11" fill="#991b1b" text-anchor="middle" font-weight="bold">Antiválečné drama</text>
  <text x="452" y="115" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Morální apel na</text>
  <text x="452" y="128" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">lidskost a mír.</text>
  <text x="452" y="145" font-family="sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle" font-style="italic">Bílá nemoc, Matka, R.U.R.</text>
  <text x="452" y="158" font-family="sans-serif" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="bold">→ expresionismus</text>

  <!-- Fejetony -->
  <rect x="80" y="185" width="175" height="95" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="167" y="212" font-size="30" text-anchor="middle">✍️</text>
  <text x="167" y="232" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle" font-weight="bold">Fejeton &amp; sloupek</text>
  <text x="167" y="247" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Vtipné, krátké, duchaplné —</text>
  <text x="167" y="260" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">formoval moderní českou publicistiku.</text>
  <text x="167" y="275" font-family="sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">→ Lidové noviny</text>

  <!-- Cestopisy -->
  <rect x="300" y="185" width="175" height="95" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="387" y="212" font-size="30" text-anchor="middle">🗺️</text>
  <text x="387" y="232" font-family="sans-serif" font-size="11" fill="#5b21b6" text-anchor="middle" font-weight="bold">Cestopisy</text>
  <text x="387" y="247" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Osobité, humorné vyprávění</text>
  <text x="387" y="260" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">z cest po Evropě.</text>
  <text x="387" y="275" font-family="sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">→ Anglické listy, Italské listy…</text>
</svg>
