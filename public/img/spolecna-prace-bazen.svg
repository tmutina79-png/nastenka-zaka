<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="16" fill="#f8fafc"/>
  <text x="260" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Příklad: Plnění bazénu dvěma trubkami</text>

  <!-- Pool shape -->
  <rect x="160" y="80" width="200" height="120" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <!-- Water level -->
  <rect x="162" y="130" width="196" height="68" rx="4" fill="#60a5fa" opacity="0.35"/>
  <text x="260" y="168" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1d4ed8">Bazén = 1 celá práce</text>

  <!-- Pipe A (left) -->
  <rect x="80" y="60" width="20" height="60" rx="4" fill="#6366f1"/>
  <rect x="80" y="60" width="80" height="12" rx="4" fill="#6366f1"/>
  <!-- Water drops -->
  <circle cx="90" cy="130" r="4" fill="#818cf8" opacity="0.6"/>
  <circle cx="90" cy="145" r="3" fill="#818cf8" opacity="0.4"/>
  <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#4338ca">Trubka A</text>
  <text x="90" y="218" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">naplní za 4 h</text>
  <text x="90" y="232" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6366f1">v₁ = 1/4</text>

  <!-- Pipe B (right) -->
  <rect x="420" y="60" width="20" height="60" rx="4" fill="#10b981"/>
  <rect x="360" y="60" width="80" height="12" rx="4" fill="#10b981"/>
  <!-- Water drops -->
  <circle cx="430" cy="130" r="4" fill="#34d399" opacity="0.6"/>
  <circle cx="430" cy="145" r="3" fill="#34d399" opacity="0.4"/>
  <text x="430" y="52" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#065f46">Trubka B</text>
  <text x="430" y="218" text-anchor="middle" font-family="system-ui" font-size="10" fill="#10b981">naplní za 6 h</text>
  <text x="430" y="232" text-anchor="middle" font-family="system-ui" font-size="10" fill="#10b981">v₂ = 1/6</text>

  <!-- Result box -->
  <rect x="100" y="250" width="320" height="36" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="260" y="273" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#92400e">Společně: 1/4 + 1/6 = 5/12 → t = 12/5 = 2 h 24 min</text>
</svg>