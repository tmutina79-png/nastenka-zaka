<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#252526"/>
    </linearGradient>
  </defs>
  
  <!-- Pozadí -->
  <rect width="800" height="350" fill="#f8fafc"/>
  
  <!-- Kód vlevo -->
  <g transform="translate(30, 20)">
    <rect x="0" y="0" width="350" height="140" rx="8" fill="url(#codeBg)"/>
    <circle cx="15" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="49" cy="15" r="5" fill="#28ca42"/>
    
    <text x="15" y="50" fill="#569cd6" font-family="Courier" font-size="12">t</text>
    <text x="25" y="50" fill="#dcdcaa" font-family="Courier" font-size="12">.write(</text>
    <text x="75" y="50" fill="#ce9178" font-family="Courier" font-size="12">"Ahoj!"</text>
    <text x="130" y="50" fill="#dcdcaa" font-family="Courier" font-size="12">,</text>
    
    <text x="40" y="70" fill="#9cdcfe" font-family="Courier" font-size="12">move</text>
    <text x="75" y="70" fill="#dcdcaa" font-family="Courier" font-size="12">=</text>
    <text x="85" y="70" fill="#569cd6" font-family="Courier" font-size="12">False</text>
    <text x="122" y="70" fill="#dcdcaa" font-family="Courier" font-size="12">,</text>
    
    <text x="40" y="90" fill="#9cdcfe" font-family="Courier" font-size="12">align</text>
    <text x="82" y="90" fill="#dcdcaa" font-family="Courier" font-size="12">=</text>
    <text x="92" y="90" fill="#ce9178" font-family="Courier" font-size="12">"center"</text>
    <text x="155" y="90" fill="#dcdcaa" font-family="Courier" font-size="12">,</text>
    
    <text x="40" y="110" fill="#9cdcfe" font-family="Courier" font-size="12">font</text>
    <text x="72" y="110" fill="#dcdcaa" font-family="Courier" font-size="12">=</text>
    <text x="82" y="110" fill="#dcdcaa" font-family="Courier" font-size="12">(</text>
    <text x="90" y="110" fill="#ce9178" font-family="Courier" font-size="12">"Arial"</text>
    <text x="142" y="110" fill="#dcdcaa" font-family="Courier" font-size="12">,</text>
    <text x="152" y="110" fill="#b5cea8" font-family="Courier" font-size="12">24</text>
    <text x="168" y="110" fill="#dcdcaa" font-family="Courier" font-size="12">,</text>
    <text x="178" y="110" fill="#ce9178" font-family="Courier" font-size="12">"bold"</text>
    <text x="225" y="110" fill="#dcdcaa" font-family="Courier" font-size="12">)</text>
    
    <text x="15" y="130" fill="#dcdcaa" font-family="Courier" font-size="12">)</text>
  </g>
  
  <!-- Šipky k vysvětlení -->
  <g transform="translate(400, 20)">
    <!-- move -->
    <rect x="0" y="0" width="180" height="50" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
    <text x="90" y="20" fill="#1565c0" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">move = False</text>
    <text x="90" y="38" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">Želva se nepohne za text</text>
    
    <!-- align -->
    <rect x="200" y="0" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
    <text x="290" y="20" fill="#2e7d32" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">align = "center"</text>
    <text x="290" y="38" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">Text bude vycentrovaný</text>
  </g>
  
  <!-- font parametr -->
  <g transform="translate(400, 85)">
    <rect x="0" y="0" width="380" height="75" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="190" y="20" fill="#e65100" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">font = ("Arial", 24, "bold")</text>
    <line x1="60" y1="35" x2="60" y2="50" stroke="#666" stroke-width="1"/>
    <line x1="160" y1="35" x2="160" y2="50" stroke="#666" stroke-width="1"/>
    <line x1="280" y1="35" x2="280" y2="50" stroke="#666" stroke-width="1"/>
    <text x="60" y="65" fill="#333" font-family="Arial" font-size="10" text-anchor="middle">Název fontu</text>
    <text x="160" y="65" fill="#333" font-family="Arial" font-size="10" text-anchor="middle">Velikost (px)</text>
    <text x="280" y="65" fill="#333" font-family="Arial" font-size="10" text-anchor="middle">Styl písma</text>
  </g>
  
  <!-- Vizuální ukázka dole -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="740" height="150" rx="8" fill="#1a1a2e"/>
    <text x="370" y="25" fill="#888" font-family="Arial" font-size="12" text-anchor="middle">Výstup na plátno:</text>
    
    <!-- Želva a text -->
    <g transform="translate(370, 90)">
      <!-- Pozice želvy -->
      <polygon points="0,-8 -6,8 6,8" fill="#2ecc71"/>
      <circle cx="0" cy="0" r="3" fill="#fff"/>
      
      <!-- Text "Ahoj!" -->
      <text x="0" y="-25" fill="#ecf0f1" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">Ahoj!</text>
      
      <!-- Popisky -->
      <line x1="-50" y1="-25" x2="-80" y2="-25" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="50" y1="-25" x2="80" y2="-25" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="-120" y="-20" fill="#e74c3c" font-family="Arial" font-size="10">align="center"</text>
      <text x="90" y="-20" fill="#e74c3c" font-family="Arial" font-size="10">text na obě strany</text>
      
      <!-- Šipka k želvě -->
      <line x1="0" y1="15" x2="0" y2="35" stroke="#2ecc71" stroke-width="1"/>
      <text x="0" y="50" fill="#2ecc71" font-family="Arial" font-size="10" text-anchor="middle">pozice želvy</text>
    </g>
  </g>
  
  <!-- Tabulka stylů -->
  <text x="400" y="345" fill="#666" font-family="Arial" font-size="11" text-anchor="middle">Styly: "normal" | "bold" | "italic" | "bold italic"</text>
</svg>