<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="pythonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#306998"/>
      <stop offset="100%" style="stop-color:#ffd43b"/>
    </linearGradient>
  </defs>
  
  <!-- Pozadí -->
  <rect width="400" height="225" fill="url(#pythonBg)"/>
  
  <!-- Dekorativní mřížka -->
  <g opacity="0.1">
    <line x1="0" y1="56" x2="400" y2="56" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="112" x2="400" y2="112" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="168" x2="400" y2="168" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="225" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="225" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="225" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Python logo stylizované -->
  <g transform="translate(40, 35)">
    <circle cx="25" cy="25" r="25" fill="#306998" opacity="0.3"/>
    <text x="25" y="35" fill="#ffd43b" font-family="Arial" font-size="28" text-anchor="middle" font-weight="bold">🐢</text>
  </g>
  
  <!-- Nadpis -->
  <text x="200" y="50" fill="#fff" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold">Python: Kreslení textu</text>
  
  <!-- Ukázka kódu -->
  <g transform="translate(50, 75)">
    <rect x="0" y="0" width="300" height="70" rx="6" fill="#0f0f23" opacity="0.8"/>
    <text x="15" y="25" fill="#c586c0" font-family="Courier" font-size="12">import</text>
    <text x="60" y="25" fill="#9cdcfe" font-family="Courier" font-size="12">turtle</text>
    <text x="15" y="48" fill="#dcdcaa" font-family="Courier" font-size="12">t.write(</text>
    <text x="80" y="48" fill="#ce9178" font-family="Courier" font-size="12">"Ahoj!"</text>
    <text x="138" y="48" fill="#dcdcaa" font-family="Courier" font-size="12">)</text>
  </g>
  
  <!-- Ukázka výstupu -->
  <g transform="translate(85, 155)">
    <!-- Želva -->
    <polygon points="20,0 12,18 28,18" fill="#2ecc71"/>
    <circle cx="20" cy="6" r="3" fill="#fff"/>
    
    <!-- Text z write() -->
    <text x="35" y="12" fill="#fff" font-family="Arial" font-size="18" font-weight="bold">Ahoj!</text>
    
    <!-- Barevné varianty -->
    <text x="100" y="12" fill="#e74c3c" font-family="Arial" font-size="14" font-weight="bold">Text</text>
    <text x="140" y="12" fill="#3498db" font-family="Arial" font-size="14" font-weight="bold">v</text>
    <text x="155" y="12" fill="#2ecc71" font-family="Arial" font-size="14" font-weight="bold">barvách</text>
  </g>
  
  <!-- VIDEO badge -->
  <g transform="translate(10, 185)">
    <rect x="0" y="0" width="70" height="28" rx="6" fill="#e74c3c"/>
    <text x="12" y="19" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">▶ VIDEO</text>
  </g>
  
  <!-- Dekorace - fonty -->
  <g transform="translate(320, 155)">
    <text x="0" y="0" fill="#f39c12" font-family="Georgia" font-size="16" font-style="italic">Aa</text>
    <text x="30" y="0" fill="#9b59b6" font-family="Arial" font-size="18" font-weight="bold">Bb</text>
    <text x="0" y="25" fill="#3498db" font-family="Courier" font-size="14">Cc</text>
  </g>
</svg>