<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" rx="12" fill="url(#bgV)"/>

  <!-- Ground (gravel) -->
  <rect x="20" y="70" width="360" height="120" rx="6" fill="#1c1917"/>

  <!-- Sleepers -->
  <rect x="50" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="85" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="120" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="155" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="190" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="225" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="260" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="295" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="330" y="78" width="5" height="104" fill="#78350f"/>
  <rect x="365" y="78" width="5" height="104" fill="#78350f"/>

  <!-- Center line (přímka p) -->
  <line x1="30" y1="130" x2="380" y2="130" stroke="#fbbf24" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="22" y="126" font-size="10" font-weight="700" fill="#fbbf24">p</text>

  <!-- Rail p₁ (top) -->
  <line x1="30" y1="95" x2="380" y2="95" stroke="#94a3b8" stroke-width="4"/>
  <text x="385" y="99" font-size="10" font-weight="700" fill="#818cf8">p₁</text>

  <!-- Rail p₂ (bottom) -->
  <line x1="30" y1="165" x2="380" y2="165" stroke="#94a3b8" stroke-width="4"/>
  <text x="385" y="169" font-size="10" font-weight="700" fill="#818cf8">p₂</text>

  <!-- Distance markers -->
  <line x1="70" y1="95" x2="70" y2="130" stroke="#34d399" stroke-width="1.5"/>
  <text x="78" y="116" font-size="10" font-weight="700" fill="#34d399">d</text>
  <line x1="70" y1="130" x2="70" y2="165" stroke="#34d399" stroke-width="1.5"/>
  <text x="78" y="151" font-size="10" font-weight="700" fill="#34d399">d</text>

  <!-- Train -->
  <rect x="180" y="100" width="100" height="60" rx="6" fill="#dc2626"/>
  <rect x="192" y="106" width="18" height="14" rx="2" fill="#bfdbfe"/>
  <rect x="218" y="106" width="18" height="14" rx="2" fill="#bfdbfe"/>
  <rect x="244" y="106" width="18" height="14" rx="2" fill="#bfdbfe"/>
  <rect x="275" y="108" width="12" height="44" rx="0 4 4 0" fill="#b91c1c"/>
  <circle cx="284" cy="130" r="5" fill="#fbbf24"/>
  <!-- Wheels -->
  <circle cx="200" cy="96" r="7" fill="#1e293b"/>
  <circle cx="230" cy="96" r="7" fill="#1e293b"/>
  <circle cx="260" cy="96" r="7" fill="#1e293b"/>
  <circle cx="200" cy="164" r="7" fill="#1e293b"/>
  <circle cx="230" cy="164" r="7" fill="#1e293b"/>
  <circle cx="260" cy="164" r="7" fill="#1e293b"/>

  <!-- Play button -->
  <circle cx="200" cy="130" r="28" fill="rgba(0,0,0,0.45)"/>
  <path d="M192,116 L192,144 L215,130 Z" fill="white"/>

  <!-- Title -->
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">🚂 Koleje a vlak – rovnoběžky</text>
</svg>
