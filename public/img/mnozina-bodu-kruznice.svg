<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bg)"/>
  
  <!-- Kružnice -->
  <circle cx="250" cy="200" r="120" fill="none" stroke="#818cf8" stroke-width="4"/>
  
  <!-- Střed S -->
  <circle cx="250" cy="200" r="6" fill="#fbbf24"/>
  <text x="260" y="195" fill="#fbbf24" font-size="18" font-weight="bold">S</text>
  
  <!-- Poloměr -->
  <line x1="250" y1="200" x2="370" y2="200" stroke="#34d399" stroke-width="3"/>
  <text x="310" y="188" fill="#34d399" font-size="16" font-weight="bold">r</text>
  
  <!-- Body na kružnici -->
  <circle cx="370" cy="200" r="5" fill="#f87171"/>
  <text x="380" y="200" fill="#f87171" font-size="14">X₁</text>
  
  <circle cx="205" cy="85" r="5" fill="#f87171"/>
  <text x="195" y="75" fill="#f87171" font-size="14">X₂</text>
  
  <circle cx="130" cy="200" r="5" fill="#f87171"/>
  <text x="115" y="195" fill="#f87171" font-size="14">X₃</text>
  
  <circle cx="320" cy="308" r="5" fill="#f87171"/>
  <text x="330" y="315" fill="#f87171" font-size="14">X₄</text>
  
  <!-- Poloměry ke všem bodům (čárkované) -->
  <line x1="250" y1="200" x2="205" y2="85" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="250" y1="200" x2="130" y2="200" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="250" y1="200" x2="320" y2="308" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  
  <!-- Titulek -->
  <text x="250" y="45" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">Kružnice k(S; r)</text>
  
  <!-- Definice -->
  <text x="250" y="370" text-anchor="middle" fill="#94a3b8" font-size="14">Množina všech bodů X, pro které platí |SX| = r</text>
</svg>
