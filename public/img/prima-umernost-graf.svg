<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="system-ui, sans-serif">
  <defs>
    <marker id="apd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1e3a5f"/></marker>
  </defs>

  <text x="260" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">Graf přímé úměrnosti  y = kx</text>

  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="0.7">
    <line x1="60" y1="60" x2="60" y2="380"/><line x1="120" y1="60" x2="120" y2="380"/>
    <line x1="180" y1="60" x2="180" y2="380"/><line x1="240" y1="60" x2="240" y2="380"/>
    <line x1="300" y1="60" x2="300" y2="380"/><line x1="360" y1="60" x2="360" y2="380"/>
    <line x1="420" y1="60" x2="420" y2="380"/><line x1="480" y1="60" x2="480" y2="380"/>
    <line x1="40" y1="80" x2="500" y2="80"/><line x1="40" y1="140" x2="500" y2="140"/>
    <line x1="40" y1="200" x2="500" y2="200"/><line x1="40" y1="260" x2="500" y2="260"/>
    <line x1="40" y1="320" x2="500" y2="320"/><line x1="40" y1="380" x2="500" y2="380"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="380" x2="500" y2="380" stroke="#1e3a5f" stroke-width="2" marker-end="url(#apd)"/>
  <line x1="60" y1="380" x2="60" y2="50" stroke="#1e3a5f" stroke-width="2" marker-end="url(#apd)"/>
  <text x="505" y="394" font-size="14" font-weight="600" fill="#1e3a5f">x</text>
  <text x="45" y="52" font-size="14" font-weight="600" fill="#1e3a5f">y</text>
  <text x="52" y="396" text-anchor="end" font-size="11" fill="#64748b">0</text>

  <!-- X labels -->
  <text x="120" y="398" text-anchor="middle" font-size="11" fill="#64748b">1</text>
  <text x="180" y="398" text-anchor="middle" font-size="11" fill="#64748b">2</text>
  <text x="240" y="398" text-anchor="middle" font-size="11" fill="#64748b">3</text>
  <text x="300" y="398" text-anchor="middle" font-size="11" fill="#64748b">4</text>
  <text x="360" y="398" text-anchor="middle" font-size="11" fill="#64748b">5</text>
  <text x="420" y="398" text-anchor="middle" font-size="11" fill="#64748b">6</text>
  <text x="480" y="398" text-anchor="middle" font-size="11" fill="#64748b">7</text>

  <!-- Y labels -->
  <text x="50" y="324" text-anchor="end" font-size="11" fill="#64748b">1</text>
  <text x="50" y="264" text-anchor="end" font-size="11" fill="#64748b">2</text>
  <text x="50" y="204" text-anchor="end" font-size="11" fill="#64748b">3</text>
  <text x="50" y="144" text-anchor="end" font-size="11" fill="#64748b">4</text>
  <text x="50" y="84" text-anchor="end" font-size="11" fill="#64748b">5</text>

  <!-- y = 2x (steep, blue) -->
  <line x1="60" y1="380" x2="210" y2="80" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <text x="215" y="72" font-size="13" font-weight="700" fill="#2563eb">y = 2x</text>

  <!-- y = x (medium, green) -->
  <line x1="60" y1="380" x2="360" y2="80" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="365" y="72" font-size="13" font-weight="700" fill="#16a34a">y = x</text>

  <!-- y = 0.5x (gentle, orange) -->
  <line x1="60" y1="380" x2="480" y2="170" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  <text x="460" y="158" font-size="13" font-weight="700" fill="#ea580c">y = ½x</text>

  <!-- Origin dot -->
  <circle cx="60" cy="380" r="5" fill="#1e3a5f"/>
  <text x="75" y="405" font-size="11" fill="#1e3a5f" font-weight="600">Vždy prochází [0, 0]</text>
</svg>
