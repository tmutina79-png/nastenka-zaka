<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="playGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="chalkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bgGrad2)"/>
  
  <!-- Blackboard/Greenboard -->
  <rect x="25" y="25" width="200" height="120" rx="6" fill="url(#chalkGrad)"/>
  <rect x="25" y="25" width="200" height="120" rx="6" fill="none" stroke="#854d0e" stroke-width="6"/>
  
  <!-- Chalk writing on board -->
  <text x="40" y="50" font-family="Comic Sans MS, cursive" font-size="12" fill="#fef3c7" opacity="0.95">Příklad: Bazén</text>
  
  <!-- Formula on board -->
  <text x="40" y="75" font-family="system-ui" font-size="11" fill="#fef3c7" opacity="0.9">v₁ = 1/4</text>
  <text x="110" y="75" font-family="system-ui" font-size="11" fill="#fef3c7" opacity="0.9">v₂ = 1/6</text>
  
  <text x="40" y="100" font-family="system-ui" font-size="11" fill="#fef3c7" opacity="0.9">v = 1/4 + 1/6 = 5/12</text>
  
  <text x="40" y="125" font-family="system-ui" font-size="12" font-weight="600" fill="#fde047">t = 12/5 = 2,4 h ✓</text>
  
  <!-- Chalk pieces -->
  <rect x="195" y="130" width="18" height="6" rx="2" fill="#fef3c7" opacity="0.8"/>
  <rect x="178" y="132" width="12" height="5" rx="2" fill="#fca5a5" opacity="0.8"/>
  
  <!-- Pointer/teacher hand indicator -->
  <g transform="translate(235, 55)">
    <circle cx="30" cy="30" r="25" fill="#475569" opacity="0.5"/>
    <text x="30" y="35" text-anchor="middle" font-size="28">👨‍🏫</text>
  </g>
  
  <!-- Water/pool icon -->
  <g transform="translate(255, 100)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <path d="M5 15 Q15 10 25 15 Q35 20 40 15" stroke="#0ea5e9" stroke-width="2" fill="none"/>
    <path d="M5 22 Q15 17 25 22 Q35 27 40 22" stroke="#0ea5e9" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Play button circle -->
  <circle cx="160" cy="130" r="28" fill="url(#playGrad2)" opacity="0.95"/>
  <circle cx="160" cy="130" r="28" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  
  <!-- Play triangle -->
  <path d="M153 118 L153 142 L173 130 Z" fill="white"/>
  
  <!-- Video indicator strip -->
  <rect x="0" y="175" width="320" height="25" rx="0" fill="#0f172a"/>
  <rect x="0" y="175" width="320" height="1" fill="#334155"/>
  
  <!-- Whiteboard/classroom icon -->
  <g transform="translate(12, 181)">
    <rect x="0" y="0" width="12" height="10" rx="1" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="6" y2="10" stroke="#64748b" stroke-width="1.5"/>
    <line x1="12" y1="12" x2="6" y2="10" stroke="#64748b" stroke-width="1.5"/>
  </g>
  
  <!-- Video label -->
  <text x="32" y="191" font-family="system-ui" font-size="11" font-weight="600" fill="#e2e8f0">▶ Řešení příkladu na tabuli</text>
  
  <!-- Duration badge -->
  <rect x="265" y="180" width="45" height="16" rx="4" fill="#334155"/>
  <text x="287" y="191" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#94a3b8">3:20</text>
</svg>
