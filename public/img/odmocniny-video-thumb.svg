<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" fill="none">
  <defs>
    <linearGradient id="bgMath" x1="0" y1="0" x2="200" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <!-- Pozadí -->
  <rect width="200" height="130" rx="12" fill="url(#bgMath)" stroke="#93c5fd" stroke-width="2"/>
  
  <!-- Čtverec s odmocninou -->
  <rect x="55" y="35" width="50" height="50" fill="#fff" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <!-- Mřížka ve čtverci -->
  <line x1="72" y1="35" x2="72" y2="85" stroke="#93c5fd" stroke-width="1"/>
  <line x1="88" y1="35" x2="88" y2="85" stroke="#93c5fd" stroke-width="1"/>
  <line x1="55" y1="52" x2="105" y2="52" stroke="#93c5fd" stroke-width="1"/>
  <line x1="55" y1="68" x2="105" y2="68" stroke="#93c5fd" stroke-width="1"/>
  
  <!-- Číslo ve čtverci -->
  <text x="80" y="67" font-family="Georgia, serif" font-size="20" fill="#1e40af" text-anchor="middle" font-weight="bold">9</text>
  
  <!-- Šipka ven -->
  <path d="M108,60 L125,60" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Odmocnina vzorec -->
  <g transform="translate(130, 50)">
    <!-- sqrt symbol -->
    <path d="M0,18 L4,12 L8,22 L12,0 L50,0" stroke="#1e40af" stroke-width="2" fill="none"/>
    <text x="16" y="16" font-family="Georgia, serif" font-size="16" fill="#1e40af" font-weight="bold">9</text>
    <text x="40" y="16" font-family="Georgia, serif" font-size="16" fill="#3b82f6" font-weight="bold">= 3</text>
  </g>
  
  <!-- Kótování strany -->
  <line x1="55" y1="92" x2="105" y2="92" stroke="#64748b" stroke-width="1"/>
  <line x1="55" y1="88" x2="55" y2="96" stroke="#64748b" stroke-width="1"/>
  <line x1="105" y1="88" x2="105" y2="96" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="102" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">strana = 3</text>
  
  <!-- Nadpis -->
  <text x="100" y="20" font-family="Georgia, serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">Jak vzniká odmocnina</text>
  
  <!-- Spodní text -->
  <text x="100" y="122" font-family="sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">Vizualizace</text>
  
  <!-- Video badge - levý dolní roh -->
  <rect x="8" y="102" width="42" height="18" rx="4" fill="#1e40af"/>
  <polygon points="18,107 18,115 25,111" fill="#fff"/>
  <text x="38" y="114" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
