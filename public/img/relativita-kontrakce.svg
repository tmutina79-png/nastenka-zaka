<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="520" height="380" rx="16" fill="#f8fafc"/>

  <text x="260" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Kontrakce délky</text>
  <text x="260" y="52" text-anchor="middle" font-size="13" fill="#64748b">Objekty se ve směru pohybu zkracují</text>

  <!-- REST frame -->
  <text x="135" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">V klidu (v = 0)</text>

  <!-- spaceship at rest: full length -->
  <rect x="50" y="110" width="170" height="60" rx="30" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="220,125 250,140 220,155" fill="#3b82f6"/>
  <circle cx="100" cy="130" r="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="150" cy="130" r="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- dimension line -->
  <line x1="50" y1="190" x2="250" y2="190" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="50" y1="185" x2="50" y2="195" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="250" y1="185" x2="250" y2="195" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="150" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">L₀ = 100 m</text>

  <!-- MOVING frame -->
  <text x="385" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Rychlost 0,8c</text>

  <!-- contracted spaceship -->
  <rect x="320" y="116" width="102" height="48" rx="24" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="422,125 445,140 422,155" fill="#f59e0b"/>
  <circle cx="355" cy="133" r="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="390" cy="133" r="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- speed arrow -->
  <line x1="450" y1="140" x2="480" y2="140" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#ef4444"/></marker></defs>
  <text x="465" y="132" font-size="11" font-weight="600" fill="#ef4444">v</text>

  <!-- dimension line -->
  <line x1="320" y1="190" x2="445" y2="190" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="320" y1="185" x2="320" y2="195" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="445" y1="185" x2="445" y2="195" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="382" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#f59e0b">L = 60 m</text>

  <!-- Graph: L vs v -->
  <rect x="50" y="240" width="420" height="120" rx="8" fill="#f1f5f9"/>

  <!-- graph axes -->
  <line x1="80" y1="260" x2="80" y2="350" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="440" y2="350" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="56" y="268" font-size="11" font-weight="600" fill="#1e3a5f">L/L₀</text>
  <text x="440" y="346" font-size="11" font-weight="600" fill="#1e3a5f">v/c</text>

  <!-- tick marks -->
  <text x="74" y="275" font-size="10" fill="#64748b">1</text>
  <line x1="78" y1="270" x2="82" y2="270" stroke="#64748b"/>
  <text x="68" y="315" font-size="10" fill="#64748b">0.5</text>
  <line x1="78" y1="310" x2="82" y2="310" stroke="#64748b"/>

  <text x="256" y="364" font-size="10" fill="#64748b">0.5</text>
  <line x1="260" y1="348" x2="260" y2="352" stroke="#64748b"/>
  <text x="426" y="364" font-size="10" fill="#64748b">1</text>
  <line x1="430" y1="348" x2="430" y2="352" stroke="#64748b"/>

  <!-- curve L/L0 = sqrt(1 - v^2/c^2) -->
  <!-- v/c from 0 to 0.99, x: 80..430 (span 350), y: 270..350 (span 80) -->
  <path d="M80,270 Q120,270 180,272 Q240,276 290,286 Q340,302 370,318 Q400,336 420,348 L430,350"
        stroke="#3b82f6" stroke-width="2.5" fill="none"/>

  <!-- marker for 0.8c -->
  <circle cx="360" cy="316" r="4" fill="#ef4444"/>
  <text x="366" y="312" font-size="10" font-weight="600" fill="#ef4444">v = 0,8c → L/L₀ = 0,6</text>

  <!-- formula at bottom with proper square root -->
  <g font-size="14" font-weight="700" fill="#1e3a5f">
    <text x="180" y="378">L = L₀ ·</text>
    <!-- sqrt symbol with extended line over the expression -->
    <path d="M248,381 L252,374 L256,384 L260,366 L340,366" stroke="#1e3a5f" stroke-width="1.5" fill="none"/>
    <text x="263" y="378">1 − v²/c²</text>
  </g>
</svg>