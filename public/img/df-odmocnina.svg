<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="800" height="480" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#1e293b">📊 Odmocnina f(x) = √(x − 1)  —  pod odmocninou ≥ 0</text>

  <!-- Coordinate system -->
  <g transform="translate(60,50)">
    <!-- Grid -->
    <g stroke="#f1f5f9" stroke-width="1">
      <line x1="0" y1="290" x2="420" y2="290"/>
      <line x1="110" y1="0" x2="110" y2="380"/>
      <!-- horizontal -->
      <line x1="0" y1="40" x2="420" y2="40"/>
      <line x1="0" y1="90" x2="420" y2="90"/>
      <line x1="0" y1="140" x2="420" y2="140"/>
      <line x1="0" y1="190" x2="420" y2="190"/>
      <line x1="0" y1="240" x2="420" y2="240"/>
      <line x1="0" y1="340" x2="420" y2="340"/>
      <!-- vertical -->
      <line x1="60" y1="0" x2="60" y2="380"/>
      <line x1="160" y1="0" x2="160" y2="380"/>
      <line x1="210" y1="0" x2="210" y2="380"/>
      <line x1="260" y1="0" x2="260" y2="380"/>
      <line x1="310" y1="0" x2="310" y2="380"/>
      <line x1="360" y1="0" x2="360" y2="380"/>
    </g>

    <!-- FORBIDDEN ZONE (x < 1) -->
    <rect x="0" y="0" width="160" height="380" fill="#ef4444" opacity="0.06" rx="4"/>
    <!-- Forbidden zone pattern -->
    <g opacity="0.15">
      <line x1="0" y1="0" x2="40" y2="40" stroke="#ef4444" stroke-width="1"/>
      <line x1="20" y1="0" x2="80" y2="60" stroke="#ef4444" stroke-width="1"/>
      <line x1="60" y1="0" x2="120" y2="60" stroke="#ef4444" stroke-width="1"/>
      <line x1="100" y1="0" x2="160" y2="60" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="60" x2="60" y2="120" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="120" x2="60" y2="180" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="180" x2="60" y2="240" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="240" x2="60" y2="300" stroke="#ef4444" stroke-width="1"/>
      <line x1="60" y1="120" x2="140" y2="200" stroke="#ef4444" stroke-width="1"/>
      <line x1="60" y1="200" x2="140" y2="280" stroke="#ef4444" stroke-width="1"/>
      <line x1="60" y1="280" x2="160" y2="380" stroke="#ef4444" stroke-width="1"/>
      <line x1="100" y1="60" x2="160" y2="120" stroke="#ef4444" stroke-width="1"/>
      <line x1="100" y1="140" x2="160" y2="200" stroke="#ef4444" stroke-width="1"/>
      <line x1="100" y1="220" x2="160" y2="280" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="300" x2="60" y2="360" stroke="#ef4444" stroke-width="1"/>
      <line x1="100" y1="300" x2="160" y2="360" stroke="#ef4444" stroke-width="1"/>
    </g>

    <!-- Forbidden zone label -->
    <rect x="15" y="88" width="120" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="75" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">⛔ x &lt; 1</text>
    <text x="75" y="124" text-anchor="middle" font-size="11" fill="#dc2626">záporné pod √</text>

    <!-- Axes -->
    <line x1="0" y1="290" x2="420" y2="290" stroke="#475569" stroke-width="2"/>
    <line x1="110" y1="0" x2="110" y2="380" stroke="#475569" stroke-width="2"/>
    <polygon points="420,290 412,286 412,294" fill="#475569"/>
    <polygon points="110,0 106,8 114,8" fill="#475569"/>
    <text x="415" y="282" font-size="13" font-weight="700" fill="#475569">x</text>
    <text x="120" y="14" font-size="13" font-weight="700" fill="#475569">y</text>

    <!-- Tick labels x-axis -->
    <g font-size="11" fill="#64748b" text-anchor="middle">
      <text x="60" y="306">−1</text>
      <text x="118" y="306" font-size="10">0</text>
      <text x="160" y="306">1</text>
      <text x="210" y="306">2</text>
      <text x="260" y="306">3</text>
      <text x="310" y="306">4</text>
      <text x="360" y="306">5</text>
    </g>
    <!-- Tick labels y-axis -->
    <g font-size="11" fill="#64748b" text-anchor="end">
      <text x="104" y="244">1</text>
      <text x="104" y="194">2</text>
      <text x="104" y="144">3</text>
    </g>

    <!-- Curve √(x-1): starts at (1,0), going through (2,1), (5,2), etc. -->
    <path d="M160,290 Q175,270 210,240 Q260,195 310,160 Q360,135 420,108" 
          fill="none" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Start point at (1,0) - FILLED (included) -->
    <circle cx="160" cy="290" r="7" fill="#7c3aed"/>

    <!-- D(f) highlight on x-axis from 1 to right -->
    <line x1="160" y1="293" x2="415" y2="293" stroke="#10b981" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
    <circle cx="160" cy="293" r="5" fill="#10b981"/>
  </g>

  <!-- Right panel: explanation -->
  <g transform="translate(510,65)">
    <!-- Formula box -->
    <rect x="0" y="0" width="270" height="55" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="135" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#7c3aed">f(x) = √(x − 1)</text>
    <text x="135" y="46" text-anchor="middle" font-size="12" fill="#6d28d9">Funkce s odmocninou</text>

    <!-- Step 1 -->
    <rect x="0" y="72" width="270" height="46" rx="10" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
    <text x="15" y="94" font-size="13" font-weight="700" fill="#d97706">⚠ Podmínka:</text>
    <text x="15" y="110" font-size="14" font-weight="600" fill="#92400e">x − 1 ≥ 0  →  x ≥ 1</text>

    <!-- Why -->
    <rect x="0" y="132" width="270" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="135" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">Proč? Zkusíme x = 0:</text>
    <text x="135" y="176" text-anchor="middle" font-size="17" font-weight="700" fill="#dc2626">f(0) = √(0−1) = √(−1)</text>
    <text x="135" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">= NEEXISTUJE! 💥</text>

    <!-- OK example -->
    <rect x="0" y="226" width="270" height="60" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="135" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">✅ Ale pro x = 5:</text>
    <text x="135" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#059669">f(5) = √(5−1) = √4 = 2  ✓</text>

    <!-- Rule -->
    <rect x="0" y="300" width="270" height="50" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="135" y="322" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">📏 Pravidlo:</text>
    <text x="135" y="340" text-anchor="middle" font-size="13" fill="#1e293b">Pod odmocninou musí být ≥ 0</text>

    <!-- Result -->
    <rect x="0" y="365" width="270" height="55" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
    <text x="135" y="388" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Výsledek:</text>
    <text x="135" y="410" text-anchor="middle" font-size="20" font-weight="800" fill="#059669">D(f) = ⟨1, +∞)</text>
  </g>
</svg>
