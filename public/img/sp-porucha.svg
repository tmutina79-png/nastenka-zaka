<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="#f0f9ff"/>
  
  <!-- Factory floor -->
  <rect x="0" y="155" width="400" height="45" fill="#94a3b8"/>
  
  <!-- Machine A -->
  <rect x="50" y="60" width="70" height="95" fill="#3b82f6" rx="5"/>
  <rect x="60" y="75" width="50" height="50" fill="#1e40af"/>
  <circle cx="85" cy="100" r="18" fill="#60a5fa">
    <animate attributeName="r" values="18;20;18" dur="1s" repeatCount="indefinite"/>
  </circle>
  <rect x="60" y="130" width="50" height="20" fill="#1e3a8a"/>
  <text x="85" y="145" text-anchor="middle" font-size="11" fill="white" font-weight="bold">5h</text>
  <text x="85" y="50" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="bold">Stroj A</text>
  
  <!-- Machine B -->
  <rect x="160" y="60" width="70" height="95" fill="#22c55e" rx="5"/>
  <rect x="170" y="75" width="50" height="50" fill="#16a34a"/>
  <circle cx="195" cy="100" r="18" fill="#86efac">
    <animate attributeName="r" values="18;20;18" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="170" y="130" width="50" height="20" fill="#166534"/>
  <text x="195" y="145" text-anchor="middle" font-size="11" fill="white" font-weight="bold">10h</text>
  <text x="195" y="50" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="bold">Stroj B</text>
  
  <!-- Broken machine indicator -->
  <g transform="translate(85, 40)">
    <circle cx="0" cy="0" r="15" fill="#ef4444"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="white" font-weight="bold">!</text>
  </g>
  <text x="85" y="20" text-anchor="middle" font-size="8" fill="#dc2626" font-weight="bold">Porucha 1h</text>
  
  <!-- Timeline -->
  <rect x="260" y="65" width="130" height="90" fill="white" stroke="#d1d5db" stroke-width="1" rx="5"/>
  <text x="325" y="82" text-anchor="middle" font-size="10" fill="#374151" font-weight="bold">Průběh:</text>
  
  <rect x="270" y="90" width="40" height="12" fill="#22c55e" rx="2"/>
  <text x="290" y="100" text-anchor="middle" font-size="7" fill="white" font-weight="bold">2h oba</text>
  
  <rect x="315" y="90" width="25" height="12" fill="#f97316" rx="2"/>
  <text x="327" y="100" text-anchor="middle" font-size="7" fill="white" font-weight="bold">1h B</text>
  
  <rect x="345" y="90" width="35" height="12" fill="#22c55e" rx="2"/>
  <text x="362" y="100" text-anchor="middle" font-size="7" fill="white" font-weight="bold">1h oba</text>
  
  <!-- Result -->
  <rect x="280" y="115" width="90" height="30" fill="#7c3aed" rx="5"/>
  <text x="325" y="128" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Celkem:</text>
  <text x="325" y="141" text-anchor="middle" font-size="13" fill="white" font-weight="bold">4 hodiny</text>
  
  <!-- Products on conveyor -->
  <g fill="#fbbf24">
    <rect x="50" y="160" width="15" height="15" rx="2"/>
    <rect x="100" y="160" width="15" height="15" rx="2"/>
    <rect x="150" y="160" width="15" height="15" rx="2"/>
    <rect x="200" y="160" width="15" height="15" rx="2"/>
  </g>
  
  <!-- Wrench icon -->
  <g transform="translate(115, 85) scale(0.5)" fill="#64748b">
    <path d="M20 8 L8 20 L12 24 L24 12 Z"/>
    <circle cx="6" cy="22" r="4"/>
    <circle cx="22" cy="6" r="4"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="188" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">Příklad 9: Dva stroje – jeden se porouchá</text>
</svg>
