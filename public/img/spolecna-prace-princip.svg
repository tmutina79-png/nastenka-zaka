<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <linearGradient id="gAB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
  </defs>
  <rect width="520" height="340" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Princip společné práce</text>

  <!-- Worker A bar -->
  <rect x="40" y="60" width="440" height="36" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <rect x="40" y="60" width="440" height="36" rx="8" fill="url(#gA)" opacity="0.25"/>
  <text x="50" y="83" font-family="system-ui" font-size="13" font-weight="600" fill="#4338ca">Pracovník A sám → celá práce za 6 hodin</text>
  <text x="470" y="83" text-anchor="end" font-family="system-ui" font-size="12" fill="#6366f1">100 %</text>

  <!-- Worker A rate -->
  <rect x="40" y="108" width="73" height="26" rx="6" fill="url(#gA)"/>
  <text x="76" y="125" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="white">1/6 práce</text>
  <text x="126" y="126" font-family="system-ui" font-size="11" fill="#64748b">za 1 hodinu</text>

  <!-- Worker B bar -->
  <rect x="40" y="156" width="440" height="36" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="40" y="156" width="440" height="36" rx="8" fill="url(#gB)" opacity="0.25"/>
  <text x="50" y="179" font-family="system-ui" font-size="13" font-weight="600" fill="#065f46">Pracovník B sám → celá práce za 3 hodiny</text>
  <text x="470" y="179" text-anchor="end" font-family="system-ui" font-size="12" fill="#10b981">100 %</text>

  <!-- Worker B rate -->
  <rect x="40" y="204" width="147" height="26" rx="6" fill="url(#gB)"/>
  <text x="113" y="221" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="white">1/3 práce</text>
  <text x="196" y="222" font-family="system-ui" font-size="11" fill="#64748b">za 1 hodinu</text>

  <!-- Plus sign -->
  <text x="260" y="260" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#94a3b8">+</text>

  <!-- Combined -->
  <rect x="40" y="274" width="440" height="44" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="260" y="296" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#92400e">Společně: 1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2 práce za hodinu</text>
  <text x="260" y="312" text-anchor="middle" font-family="system-ui" font-size="12" fill="#b45309">→ Celou práci zvládnou za 2 hodiny</text>
</svg>