<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="grassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="240" rx="12" fill="#0f172a"/>
  
  <!-- Football field -->
  <rect x="30" y="35" width="340" height="170" rx="6" fill="url(#grassG)"/>
  
  <!-- Field lines -->
  <rect x="38" y="43" width="324" height="154" rx="3" fill="none" stroke="#bbf7d0" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="200" y1="43" x2="200" y2="197" stroke="#bbf7d0" stroke-width="2"/>
  <circle cx="200" cy="120" r="25" fill="none" stroke="#bbf7d0" stroke-width="1.5"/>
  
  <!-- Goals -->
  <rect x="33" y="100" width="6" height="40" fill="white" rx="1"/>
  <rect x="361" y="100" width="6" height="40" fill="white" rx="1"/>
  
  <!-- Goal labels -->
  <circle cx="55" cy="120" r="12" fill="#ef4444"/>
  <text x="55" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">A</text>
  <circle cx="345" cy="120" r="12" fill="#ef4444"/>
  <text x="345" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">B</text>
  
  <!-- Osa úsečky (zelená čárkovaná) -->
  <line x1="200" y1="28" x2="200" y2="210" stroke="#34d399" stroke-width="3" stroke-dasharray="8,4"/>
  
  <!-- Referee -->
  <ellipse cx="200" cy="92" rx="7" ry="10" fill="#1e1e1e"/>
  <circle cx="200" cy="74" r="8" fill="#fbbf24"/>
  
  <!-- Distance lines -->
  <line x1="200" y1="85" x2="55" y2="120" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="200" y1="85" x2="345" y2="120" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Play button overlay -->
  <circle cx="200" cy="120" r="28" fill="rgba(0,0,0,0.5)"/>
  <path d="M192,106 L192,134 L215,120 Z" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">⚽ Rozhodčí – osa úsečky</text>
</svg>
