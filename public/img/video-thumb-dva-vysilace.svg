<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="8"/>
  <!-- Kružnice A (modrá) -->
  <circle cx="110" cy="90" r="60" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <circle cx="110" cy="90" r="60" fill="#60a5fa" fill-opacity="0.06"/>
  <!-- Kružnice B (zelená) -->
  <circle cx="200" cy="90" r="45" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <circle cx="200" cy="90" r="45" fill="#34d399" fill-opacity="0.06"/>
  <!-- Bod A -->
  <circle cx="110" cy="90" r="4" fill="#60a5fa"/>
  <text x="110" y="108" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">A</text>
  <!-- Bod B -->
  <circle cx="200" cy="90" r="4" fill="#34d399"/>
  <text x="200" y="108" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">B</text>
  <!-- Poloměr A -->
  <line x1="110" y1="90" x2="155" y2="60" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="125" y="70" fill="#60a5fa" font-size="8" opacity="0.8">8 km</text>
  <!-- Poloměr B -->
  <line x1="200" y1="90" x2="175" y2="55" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="180" y="65" fill="#34d399" font-size="8" opacity="0.8">6 km</text>
  <!-- Úsečka AB -->
  <line x1="110" y1="90" x2="200" y2="90" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="155" y="100" text-anchor="middle" fill="#94a3b8" font-size="8">12 km</text>
  <!-- Průsečíky X₁ a X₂ -->
  <circle cx="162" cy="55" r="5" fill="#f87171"/>
  <circle cx="162" cy="125" r="5" fill="#f87171"/>
  <text x="172" y="50" fill="#f87171" font-size="9" font-weight="bold">X₁</text>
  <text x="172" y="135" fill="#f87171" font-size="9" font-weight="bold">X₂</text>
  <!-- Glow na průsečících -->
  <circle cx="162" cy="55" r="12" fill="#f87171" fill-opacity="0.15"/>
  <circle cx="162" cy="125" r="12" fill="#f87171" fill-opacity="0.15"/>
  <!-- Popisky -->
  <text x="55" y="38" fill="#60a5fa" font-size="9" font-weight="bold">k₁(A, 8)</text>
  <text x="235" y="38" fill="#34d399" font-size="9" font-weight="bold">k₂(B, 6)</text>
  <!-- Play button -->
  <circle cx="160" cy="90" r="16" fill="rgba(255,255,255,0.12)"/>
  <polygon points="156,82 156,98 168,90" fill="white" opacity="0.9"/>
  <!-- Title -->
  <text x="160" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">Dva vysílače – průsečíky kružnic</text>
</svg>
