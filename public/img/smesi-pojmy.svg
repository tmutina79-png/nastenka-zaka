<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <defs>
    <filter id="shp"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="520" height="340" rx="16" fill="#f8fafc"/>
  <text x="260" y="32" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Důležité pojmy</text>

  <!-- Card 1: Směs -->
  <rect x="20" y="52" width="230" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shp)"/>
  <circle cx="46" cy="78" r="14" fill="#6366f1"/>
  <text x="46" y="82" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">S</text>
  <text x="68" y="74" font-family="system-ui" font-size="13" font-weight="700" fill="#1e293b">Směs (roztok)</text>
  <text x="68" y="92" font-family="system-ui" font-size="11" fill="#64748b">Kombinace dvou nebo více látek</text>
  <text x="68" y="108" font-family="system-ui" font-size="11" fill="#64748b">Např. slitina, džus, kyselina ve vodě</text>

  <!-- Card 2: Koncentrace -->
  <rect x="270" y="52" width="230" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shp)"/>
  <circle cx="296" cy="78" r="14" fill="#10b981"/>
  <text x="296" y="82" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">c</text>
  <text x="318" y="74" font-family="system-ui" font-size="13" font-weight="700" fill="#1e293b">Koncentrace (%)</text>
  <text x="318" y="92" font-family="system-ui" font-size="11" fill="#64748b">Podíl čisté látky v celku</text>
  <text x="318" y="108" font-family="system-ui" font-size="11" fill="#94a3b8">c = čistá látka / celkové množství</text>

  <!-- Card 3: Čistá látka -->
  <rect x="20" y="150" width="230" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shp)"/>
  <circle cx="46" cy="176" r="14" fill="#f59e0b"/>
  <text x="46" y="180" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">m</text>
  <text x="68" y="172" font-family="system-ui" font-size="13" font-weight="700" fill="#1e293b">Množství čisté látky</text>
  <text x="68" y="190" font-family="system-ui" font-size="11" fill="#64748b">Kolik „účinné" složky je ve směsi</text>
  <text x="68" y="208" font-family="system-ui" font-size="11" fill="#94a3b8">m = c · V   (koncentrace × objem)</text>

  <!-- Card 4: Zákon zachování -->
  <rect x="270" y="150" width="230" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shp)"/>
  <circle cx="296" cy="176" r="14" fill="#ef4444"/>
  <text x="296" y="180" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white">⚖</text>
  <text x="318" y="172" font-family="system-ui" font-size="13" font-weight="700" fill="#1e293b">Zákon zachování</text>
  <text x="318" y="190" font-family="system-ui" font-size="11" fill="#64748b">Čistá látka se smícháním neztratí</text>
  <text x="318" y="208" font-family="system-ui" font-size="11" fill="#94a3b8">m₁ + m₂ = m (celkem)</text>

  <!-- Formula box -->
  <rect x="60" y="260" width="400" height="60" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
  <text x="260" y="284" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#4338ca">Hlavní rovnice:  c₁·V₁ + c₂·V₂ = c · (V₁ + V₂)</text>
  <text x="260" y="305" text-anchor="middle" font-family="system-ui" font-size="11" fill="#6366f1">čistá látka v A  +  čistá látka v B  =  čistá látka ve směsi</text>
</svg>