<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="520" height="400" rx="16" fill="#f8fafc"/>

  <text x="260" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Dilatace času</text>
  <text x="260" y="52" text-anchor="middle" font-size="13" fill="#64748b">Čas plyne pomaleji pro rychle se pohybující objekty</text>

  <!-- Left scene: stationary clock -->
  <rect x="30" y="80" width="210" height="260" rx="12" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="135" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Pozorovatel na Zemi</text>

  <!-- clock face -->
  <circle cx="135" cy="200" r="60" fill="white" stroke="#1e3a5f" stroke-width="2.5"/>
  <circle cx="135" cy="200" r="3" fill="#1e3a5f"/>
  <!-- hour marks -->
  <line x1="135" y1="145" x2="135" y2="152" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="135" y1="248" x2="135" y2="255" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="80" y1="200" x2="87" y2="200" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="183" y1="200" x2="190" y2="200" stroke="#1e3a5f" stroke-width="2"/>
  <!-- hands pointing 12:00 → 6:00 = elapsed 6 hours -->
  <line x1="135" y1="200" x2="135" y2="155" stroke="#1e3a5f" stroke-width="2.5"/>
  <line x1="135" y1="200" x2="135" y2="248" stroke="#ef4444" stroke-width="2"/>

  <text x="135" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">t = 10 let</text>
  <text x="135" y="300" text-anchor="middle" font-size="12" fill="#64748b">Normální plynutí času</text>

  <!-- person icon -->
  <circle cx="135" cy="322" r="10" fill="#1e3a5f"/>
  <line x1="135" y1="332" x2="135" y2="354" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Right scene: spaceship clock -->
  <rect x="280" y="80" width="210" height="260" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="385" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Cestovatel (0,9c)</text>

  <!-- clock face -->
  <circle cx="385" cy="200" r="60" fill="white" stroke="#1e3a5f" stroke-width="2.5"/>
  <circle cx="385" cy="200" r="3" fill="#1e3a5f"/>
  <line x1="385" y1="145" x2="385" y2="152" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="385" y1="248" x2="385" y2="255" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="330" y1="200" x2="337" y2="200" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="433" y1="200" x2="440" y2="200" stroke="#1e3a5f" stroke-width="2"/>
  <!-- hands: less time elapsed ~4.36 h -->
  <line x1="385" y1="200" x2="385" y2="155" stroke="#1e3a5f" stroke-width="2.5"/>
  <line x1="385" y1="200" x2="405" y2="175" stroke="#10b981" stroke-width="2"/>

  <text x="385" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#10b981">t' ≈ 4,36 let</text>
  <text x="385" y="300" text-anchor="middle" font-size="12" fill="#64748b">Zpomalený čas</text>

  <!-- rocket icon -->
  <polygon points="385,316 375,340 395,340" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <rect x="380" y="340" width="10" height="8" fill="#ef4444"/>

  <!-- arrow between -->
  <line x1="245" y1="200" x2="275" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748b"/></marker></defs>

  <!-- formula with proper square root -->
  <g font-size="15" font-weight="700" fill="#1e3a5f">
    <!-- t' = t · sqrt(...) -->
    <text x="70" y="382">t' = t ·</text>
    <!-- sqrt symbol with extended line -->
    <path d="M118,385 L122,378 L126,388 L130,370 L185,370" stroke="#1e3a5f" stroke-width="1.5" fill="none"/>
    <text x="133" y="382">1 − v²/c²</text>
    
    <!-- arrow -->
    <text x="200" y="382">→</text>
    
    <!-- γ = 1 / sqrt(...) -->
    <text x="225" y="382">γ =</text>
    <!-- fraction line -->
    <line x1="255" y1="376" x2="340" y2="376" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="293" y="368" text-anchor="middle" font-size="14">1</text>
    <!-- sqrt symbol below -->
    <path d="M258,398 L262,391 L266,401 L270,383 L337,383" stroke="#1e3a5f" stroke-width="1.5" fill="none"/>
    <text x="273" y="395" font-size="13">1 − v²/c²</text>
  </g>
</svg>