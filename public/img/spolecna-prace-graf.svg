<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400">
  <rect width="520" height="400" rx="16" fill="#f8fafc"/>
  <text x="260" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Grafické znázornění – plnění práce v čase</text>

  <!-- Axes -->
  <line x1="60" y1="350" x2="490" y2="350" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="60" y1="350" x2="60" y2="50" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Arrow tips -->
  <polygon points="490,350 482,346 482,354" fill="#cbd5e1"/>
  <polygon points="60,50 56,58 64,58" fill="#cbd5e1"/>

  <!-- Y axis labels -->
  <text x="50" y="355" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">0</text>
  <text x="50" y="200" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">50 %</text>
  <text x="50" y="55" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">100 %</text>
  <text x="30" y="200" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b" transform="rotate(-90 30 200)">Hotová práce</text>

  <!-- X axis labels -->
  <text x="130" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">1h</text>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">2h</text>
  <text x="270" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">3h</text>
  <text x="340" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">4h</text>
  <text x="410" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">5h</text>
  <text x="470" y="370" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">6h</text>
  <text x="270" y="390" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">Čas (hodiny)</text>

  <!-- Grid lines -->
  <line x1="60" y1="200" x2="480" y2="200" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="130" y1="50" x2="130" y2="350" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="270" y1="50" x2="270" y2="350" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="340" y1="50" x2="340" y2="350" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="410" y1="50" x2="410" y2="350" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Worker A line (6h for 100%) slope = 300/6 = 50px per hour -->
  <!-- Points: (60,350) -> (130,300) -> (200,250) -> (270,200) -> (340,150) -> (410,100) -> (480,50) -->
  <line x1="60" y1="350" x2="480" y2="50" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <circle cx="480" cy="50" r="4" fill="#6366f1"/>

  <!-- Worker B line (3h for 100%) slope = 300/3 = 100px per hour -->
  <!-- Points: (60,350) -> (130,250) -> (200,150) -> (270,50) -->
  <line x1="60" y1="350" x2="270" y2="50" stroke="#10b981" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>
  <circle cx="270" cy="50" r="4" fill="#10b981"/>

  <!-- Together line (2h for 100%) slope = 300/2 = 150px per hour -->
  <!-- Points: (60,350) -> (130,200) -> (200,50) -->
  <line x1="60" y1="350" x2="200" y2="50" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="200" cy="50" r="5" fill="#f59e0b"/>

  <!-- 100% horizontal line -->
  <line x1="60" y1="50" x2="480" y2="50" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Marker at 2h for together -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Legend -->
  <rect x="310" y="260" width="180" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="322" y1="280" x2="350" y2="280" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="358" y="284" font-family="system-ui" font-size="11" fill="#1e293b">A sám (6 h)</text>
  <line x1="322" y1="300" x2="350" y2="300" stroke="#10b981" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="358" y="304" font-family="system-ui" font-size="11" fill="#1e293b">B sám (3 h)</text>
  <line x1="322" y1="320" x2="350" y2="320" stroke="#f59e0b" stroke-width="3"/>
  <text x="358" y="324" font-family="system-ui" font-size="11" font-weight="700" fill="#1e293b">Společně (2 h)</text>
</svg>