<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 310" font-family="system-ui, sans-serif">
  <text x="375" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">Úměrnosti kolem nás</text>

  <!-- ===== 1. Nákup ===== -->
  <g transform="translate(15,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">🛒</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Nákup v obchodě</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">PŘÍMÁ úměrnost</text>

    <g font-size="11" fill="#1e3a5f">
      <text x="20" y="100">Více kilogramů → vyšší cena</text>
      <text x="20" y="120" font-weight="600">Příklad:</text>
      <text x="20" y="140">1 kg jablek … 30 Kč</text>
      <text x="20" y="158">3 kg jablek … 90 Kč</text>
      <text x="20" y="176">5 kg jablek … 150 Kč</text>
      <text x="20" y="204" font-weight="700" fill="#2563eb">k = 30 Kč/kg</text>
      <text x="20" y="224" font-style="italic" fill="#64748b">cena = 30 · hmotnost</text>
    </g>
  </g>

  <!-- ===== 2. Rychlost ===== -->
  <g transform="translate(265,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">🚗</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Cesta autem</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">NEPŘÍMÁ úměrnost</text>

    <g font-size="11" fill="#1e3a5f">
      <text x="20" y="100">Vyšší rychlost → kratší čas</text>
      <text x="20" y="120" font-weight="600">Trasa 120 km:</text>
      <text x="20" y="140">60 km/h → 2 hodiny</text>
      <text x="20" y="158">120 km/h → 1 hodina</text>
      <text x="20" y="176">40 km/h → 3 hodiny</text>
      <text x="20" y="204" font-weight="700" fill="#dc2626">k = 120 km</text>
      <text x="20" y="224" font-style="italic" fill="#64748b">čas = 120 / rychlost</text>
    </g>
  </g>

  <!-- ===== 3. Dělníci ===== -->
  <g transform="translate(515,38)">
    <rect x="0" y="0" width="220" height="252" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="110" y="32" text-anchor="middle" font-size="30">👷</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Práce dělníků</text>
    <text x="110" y="74" text-anchor="middle" font-size="11" fill="#64748b">NEPŘÍMÁ úměrnost</text>

    <g font-size="11" fill="#1e3a5f">
      <text x="20" y="100">Více dělníků → kratší doba</text>
      <text x="20" y="120" font-weight="600">Stavba plotu:</text>
      <text x="20" y="140">2 dělníci → 6 dní</text>
      <text x="20" y="158">3 dělníci → 4 dny</text>
      <text x="20" y="176">6 dělníků → 2 dny</text>
      <text x="20" y="204" font-weight="700" fill="#dc2626">k = 12 člověkodnů</text>
      <text x="20" y="224" font-style="italic" fill="#64748b">dny = 12 / dělníci</text>
    </g>
  </g>
</svg>
