<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrR2" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" rx="16" fill="url(#bgR)"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Rovnoběžky – pojmy a značení</text>

  <!-- Přímka p (main line) -->
  <line x1="40" y1="210" x2="560" y2="210" stroke="#fbbf24" stroke-width="3"/>
  <text x="570" y="215" font-size="16" font-weight="700" fill="#fbbf24">p</text>

  <!-- Rovnoběžka p₁ (above) -->
  <line x1="40" y1="120" x2="560" y2="120" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="12,6"/>
  <text x="570" y="125" font-size="16" font-weight="700" fill="#818cf8">p₁</text>

  <!-- Rovnoběžka p₂ (below) -->
  <line x1="40" y1="300" x2="560" y2="300" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="12,6"/>
  <text x="570" y="305" font-size="16" font-weight="700" fill="#818cf8">p₂</text>

  <!-- Distance d (above) -->
  <line x1="130" y1="120" x2="130" y2="210" stroke="#34d399" stroke-width="2" marker-start="url(#arrR2)" marker-end="url(#arrR)"/>
  <text x="148" y="170" font-size="16" font-weight="700" fill="#34d399">d</text>

  <!-- Perpendicularity mark (above) -->
  <rect x="130" y="200" width="10" height="10" fill="none" stroke="#34d399" stroke-width="1.5"/>

  <!-- Distance d (below) -->
  <line x1="130" y1="210" x2="130" y2="300" stroke="#34d399" stroke-width="2" marker-start="url(#arrR2)" marker-end="url(#arrR)"/>
  <text x="148" y="260" font-size="16" font-weight="700" fill="#34d399">d</text>

  <!-- Perpendicularity mark (below) -->
  <rect x="130" y="290" width="10" height="10" fill="none" stroke="#34d399" stroke-width="1.5"/>

  <!-- Points on p₁ -->
  <circle cx="250" cy="120" r="6" fill="#f87171"/>
  <text x="250" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">X₁</text>
  <circle cx="420" cy="120" r="6" fill="#f87171"/>
  <text x="420" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">X₂</text>

  <!-- Points on p₂ -->
  <circle cx="300" cy="300" r="6" fill="#f87171"/>
  <text x="300" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">X₃</text>
  <circle cx="480" cy="300" r="6" fill="#f87171"/>
  <text x="480" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">X₄</text>

  <!-- Dashed perpendicular lines from points to p -->
  <line x1="250" y1="120" x2="250" y2="210" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="420" y1="120" x2="420" y2="210" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="300" y1="210" x2="300" y2="300" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="480" y1="210" x2="480" y2="300" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Parallel marks ∥ -->
  <text x="300" y="90" text-anchor="middle" font-size="13" fill="#94a3b8">p₁ ∥ p</text>
  <text x="300" y="345" text-anchor="middle" font-size="13" fill="#94a3b8">p₂ ∥ p</text>

  <!-- Formula box -->
  <rect x="120" y="365" width="360" height="40" rx="10" fill="rgba(129,140,248,0.15)" stroke="#818cf8" stroke-width="1"/>
  <text x="300" y="390" text-anchor="middle" font-size="15" font-weight="600" fill="#818cf8">d(X, p) = d  ⟹  X ∈ p₁ ∪ p₂</text>

  <!-- Legend -->
  <rect x="15" y="60" width="12" height="3" fill="#fbbf24"/>
  <text x="32" y="65" font-size="11" fill="#94a3b8">přímka p</text>
  <rect x="15" y="76" width="12" height="3" fill="#818cf8" stroke-dasharray="4,2"/>
  <text x="32" y="81" font-size="11" fill="#94a3b8">rovnoběžky p₁, p₂</text>
  <circle cx="21" cy="93" r="4" fill="#f87171"/>
  <text x="32" y="97" font-size="11" fill="#94a3b8">body X ve vzdálenosti d</text>
</svg>
