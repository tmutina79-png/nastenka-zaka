<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
    </linearGradient>
    <pattern id="wifiWaves" patternUnits="userSpaceOnUse" width="100" height="100">
      <circle cx="50" cy="50" r="15" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
      <circle cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Pozadí -->
  <rect width="800" height="500" fill="#f8fafc"/>
  
  <!-- ====== 1. KRUŽNICE - WiFi dosah ====== -->
  <g transform="translate(0, 0)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">📡 Dosah WiFi</text>
    
    <!-- Místnost -->
    <rect x="25" y="50" width="155" height="120" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Router -->
    <rect x="95" y="100" width="16" height="20" fill="#374151" rx="2"/>
    <line x1="98" y1="100" x2="95" y2="85" stroke="#374151" stroke-width="2"/>
    <line x1="103" y1="100" x2="100" y2="82" stroke="#374151" stroke-width="2"/>
    <line x1="108" y1="100" x2="111" y2="85" stroke="#374151" stroke-width="2"/>
    
    <!-- Kružnice dosahu -->
    <circle cx="103" cy="110" r="25" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,2" opacity="0.8"/>
    <circle cx="103" cy="110" r="45" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="4,2" opacity="0.8"/>
    <circle cx="103" cy="110" r="65" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= kružnice</text>
  </g>
  
  <!-- ====== 2. OSA ÚSEČKY - Studna mezi domy ====== -->
  <g transform="translate(200, 0)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">🏠 Kde vykopat studnu?</text>
    
    <!-- Tráva -->
    <rect x="25" y="50" width="155" height="120" fill="#dcfce7"/>
    
    <!-- Dům A -->
    <rect x="40" y="90" width="30" height="25" fill="#fbbf24"/>
    <polygon points="40,90 55,75 70,90" fill="#dc2626"/>
    <rect x="50" y="100" width="10" height="15" fill="#78350f"/>
    <text x="55" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e3a5f">A</text>
    
    <!-- Dům B -->
    <rect x="125" y="90" width="30" height="25" fill="#fbbf24"/>
    <polygon points="125,90 140,75 155,90" fill="#dc2626"/>
    <rect x="135" y="100" width="10" height="15" fill="#78350f"/>
    <text x="140" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e3a5f">B</text>
    
    <!-- Osa úsečky (svislá čára) -->
    <line x1="97" y1="55" x2="97" y2="165" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4"/>
    
    <!-- Studna na ose -->
    <circle cx="97" cy="105" r="8" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/>
    <text x="97" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">💧</text>
    
    <!-- Vzdálenosti -->
    <line x1="55" y1="145" x2="97" y2="145" stroke="#94a3b8" stroke-width="1"/>
    <line x1="97" y1="145" x2="140" y2="145" stroke="#94a3b8" stroke-width="1"/>
    <text x="76" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">stejně</text>
    <text x="118" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">daleko</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= osa úsečky</text>
  </g>
  
  <!-- ====== 3. OSA ÚHLU - Koberec v rohu ====== -->
  <g transform="translate(400, 0)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">🛋️ Kam dát lampu?</text>
    
    <!-- Místnost - roh -->
    <polygon points="30,160 30,60 170,160" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    
    <!-- Stěny -->
    <line x1="30" y1="60" x2="30" y2="160" stroke="#78350f" stroke-width="4"/>
    <line x1="30" y1="160" x2="170" y2="160" stroke="#78350f" stroke-width="4"/>
    
    <!-- Osa úhlu -->
    <line x1="30" y1="160" x2="130" y2="60" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4"/>
    
    <!-- Lampa na ose -->
    <ellipse cx="70" cy="130" rx="8" ry="5" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
    <rect x="68" y="130" width="4" height="15" fill="#78350f"/>
    <polygon points="60,145 80,145 75,155 65,155" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
    
    <!-- Paprsky světla -->
    <line x1="70" y1="125" x2="50" y2="160" stroke="#fcd34d" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="125" x2="30" y2="140" stroke="#fcd34d" stroke-width="1" opacity="0.6"/>
    
    <!-- Vzdálenosti od stěn -->
    <line x1="30" y1="130" x2="70" y2="130" stroke="#22c55e" stroke-width="2"/>
    <line x1="70" y1="160" x2="70" y2="130" stroke="#22c55e" stroke-width="2"/>
    <text x="45" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22c55e" font-weight="bold">d</text>
    <text x="80" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22c55e" font-weight="bold">d</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= osa úhlu</text>
  </g>
  
  <!-- ====== 4. ROVNOBĚŽKY - Bezpečnostní zóna ====== -->
  <g transform="translate(600, 0)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">🚧 Bezpečnostní zóna</text>
    
    <!-- Pozadí - tráva -->
    <rect x="25" y="50" width="155" height="120" fill="#dcfce7"/>
    
    <!-- Silnice -->
    <rect x="75" y="50" width="55" height="120" fill="#374151"/>
    <line x1="102" y1="55" x2="102" y2="75" stroke="#fbbf24" stroke-width="2"/>
    <line x1="102" y1="85" x2="102" y2="105" stroke="#fbbf24" stroke-width="2"/>
    <line x1="102" y1="115" x2="102" y2="135" stroke="#fbbf24" stroke-width="2"/>
    <line x1="102" y1="145" x2="102" y2="165" stroke="#fbbf24" stroke-width="2"/>
    
    <!-- Auto -->
    <rect x="85" y="95" width="20" height="35" rx="3" fill="#3b82f6"/>
    <rect x="87" y="100" width="16" height="8" fill="#bfdbfe" rx="1"/>
    <rect x="87" y="118" width="16" height="8" fill="#bfdbfe" rx="1"/>
    
    <!-- Bezpečnostní zóny - rovnoběžky -->
    <line x1="55" y1="50" x2="55" y2="170" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>
    <line x1="150" y1="50" x2="150" y2="170" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>
    
    <!-- Šrafování nebezpečné zóny -->
    <rect x="55" y="50" width="20" height="120" fill="#fecaca" opacity="0.5"/>
    <rect x="130" y="50" width="20" height="120" fill="#fecaca" opacity="0.5"/>
    
    <!-- Popisky -->
    <text x="40" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#22c55e" font-weight="bold">OK</text>
    <text x="165" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#22c55e" font-weight="bold">OK</text>
    
    <!-- Vzdálenost -->
    <text x="62" y="185" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">5 m</text>
    <text x="140" y="185" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">5 m</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= rovnoběžky</text>
  </g>
  
  <!-- ====== DRUHÁ ŘADA PŘÍKLADŮ ====== -->
  
  <!-- ====== 5. KRUŽNICE - Radar ====== -->
  <g transform="translate(100, 220)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">✈️ Letecký radar</text>
    
    <!-- Radar pozadí -->
    <circle cx="102" cy="115" r="65" fill="#0f172a"/>
    
    <!-- Kružnice radaru -->
    <circle cx="102" cy="115" r="20" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <circle cx="102" cy="115" r="40" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <circle cx="102" cy="115" r="60" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    
    <!-- Osy -->
    <line x1="102" y1="50" x2="102" y2="180" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <line x1="37" y1="115" x2="167" y2="115" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    
    <!-- Radar paprsek -->
    <line x1="102" y1="115" x2="150" y2="75" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Letadla -->
    <circle cx="85" cy="85" r="4" fill="#22c55e"/>
    <circle cx="140" cy="100" r="4" fill="#22c55e"/>
    <circle cx="120" cy="150" r="4" fill="#22c55e"/>
    
    <!-- Vzdálenosti -->
    <text x="55" y="120" font-family="Arial, sans-serif" font-size="8" fill="#22c55e">50km</text>
    <text x="68" y="90" font-family="Arial, sans-serif" font-size="8" fill="#22c55e">100km</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= kružnice</text>
  </g>
  
  <!-- ====== 6. OSA ÚSEČKY - Hřiště ====== -->
  <g transform="translate(300, 220)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">⚽ Středová čára</text>
    
    <!-- Hřiště -->
    <rect x="25" y="50" width="155" height="120" fill="#22c55e" stroke="white" stroke-width="2"/>
    
    <!-- Středová čára -->
    <line x1="102" y1="50" x2="102" y2="170" stroke="white" stroke-width="3"/>
    
    <!-- Středový kruh -->
    <circle cx="102" cy="110" r="20" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="102" cy="110" r="3" fill="white"/>
    
    <!-- Branky -->
    <rect x="25" y="90" width="8" height="40" fill="none" stroke="white" stroke-width="2"/>
    <rect x="172" y="90" width="8" height="40" fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Týmy -->
    <circle cx="60" cy="100" r="6" fill="#ef4444"/>
    <circle cx="70" cy="120" r="6" fill="#ef4444"/>
    <circle cx="50" cy="115" r="6" fill="#ef4444"/>
    
    <circle cx="145" cy="100" r="6" fill="#3b82f6"/>
    <circle cx="135" cy="120" r="6" fill="#3b82f6"/>
    <circle cx="155" cy="115" r="6" fill="#3b82f6"/>
    
    <!-- Popisky -->
    <text x="55" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">Domácí</text>
    <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">Hosté</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= osa úsečky</text>
  </g>
  
  <!-- ====== 7. ROVNOBĚŽKY - Železnice ====== -->
  <g transform="translate(500, 220)">
    <rect x="10" y="10" width="185" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="102" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">🚂 Železniční koleje</text>
    
    <!-- Pozadí - štěrk -->
    <rect x="25" y="50" width="155" height="130" fill="#d4d4d4"/>
    
    <!-- Pražce -->
    <rect x="35" y="60" width="135" height="8" fill="#78350f"/>
    <rect x="35" y="80" width="135" height="8" fill="#78350f"/>
    <rect x="35" y="100" width="135" height="8" fill="#78350f"/>
    <rect x="35" y="120" width="135" height="8" fill="#78350f"/>
    <rect x="35" y="140" width="135" height="8" fill="#78350f"/>
    <rect x="35" y="160" width="135" height="8" fill="#78350f"/>
    
    <!-- Koleje - rovnoběžky -->
    <line x1="70" y1="50" x2="70" y2="180" stroke="#64748b" stroke-width="5"/>
    <line x1="135" y1="50" x2="135" y2="180" stroke="#64748b" stroke-width="5"/>
    
    <!-- Vzdálenost -->
    <line x1="70" y1="185" x2="135" y2="185" stroke="#1e3a5f" stroke-width="1"/>
    <line x1="70" y1="182" x2="70" y2="188" stroke="#1e3a5f" stroke-width="1"/>
    <line x1="135" y1="182" x2="135" y2="188" stroke="#1e3a5f" stroke-width="1"/>
    <text x="102" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e3a5f">konstantní rozchod</text>
    
    <text x="102" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" font-style="italic">= rovnoběžky</text>
  </g>
</svg>