<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="mass" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>

  <rect width="520" height="440" rx="16" fill="#f8fafc"/>

  <text x="260" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Deformace časoprostoru</text>
  <text x="260" y="52" text-anchor="middle" font-size="13" fill="#64748b">Hmotné těleso zakřivuje okolní časoprostor</text>

  <!-- Flat spacetime grid (top portion) -->
  <text x="130" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">Bez hmotného tělesa</text>
  <!-- horizontal lines -->
  <g stroke="#93c5fd" stroke-width="1" fill="none">
    <line x1="30" y1="100" x2="230" y2="100"/>
    <line x1="30" y1="120" x2="230" y2="120"/>
    <line x1="30" y1="140" x2="230" y2="140"/>
    <line x1="30" y1="160" x2="230" y2="160"/>
    <line x1="30" y1="180" x2="230" y2="180"/>
    <!-- vertical lines -->
    <line x1="50" y1="90" x2="50" y2="190"/>
    <line x1="90" y1="90" x2="90" y2="190"/>
    <line x1="130" y1="90" x2="130" y2="190"/>
    <line x1="170" y1="90" x2="170" y2="190"/>
    <line x1="210" y1="90" x2="210" y2="190"/>
  </g>

  <!-- Curved spacetime grid (top-right) -->
  <text x="390" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">S hmotným tělesem</text>

  <!-- curved grid lines around mass -->
  <g stroke="#3b82f6" stroke-width="1" fill="none">
    <!-- horizontal curves deformed downward near center (x=390) -->
    <path d="M290,100 Q340,100 365,102 Q390,106 390,108 Q390,106 415,102 Q440,100 490,100"/>
    <path d="M290,120 Q340,120 365,126 Q390,136 390,140 Q390,136 415,126 Q440,120 490,120"/>
    <path d="M290,140 Q340,142 365,158 Q385,178 390,190 Q395,178 415,158 Q440,142 490,140"/>
    <path d="M290,160 Q340,162 365,170 Q390,180 390,184 Q390,180 415,170 Q440,162 490,160"/>
    <path d="M290,180 Q340,180 365,182 Q390,186 390,188 Q390,186 415,182 Q440,180 490,180"/>

    <!-- vertical curves -->
    <path d="M310,90 Q310,120 312,140 Q314,160 310,190"/>
    <path d="M350,90 Q350,110 355,130 Q362,160 350,190"/>
    <path d="M390,90 Q390,120 390,140 Q390,170 390,190"/>
    <path d="M430,90 Q430,110 425,130 Q418,160 430,190"/>
    <path d="M470,90 Q470,120 468,140 Q466,160 470,190"/>
  </g>

  <!-- mass sphere -->
  <circle cx="390" cy="140" r="18" fill="url(#mass)" stroke="#d97706" stroke-width="2"/>
  <text x="390" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">M</text>

  <!-- Main deformation curve graph -->
  <rect x="30" y="220" width="460" height="200" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <text x="260" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Deformační křivka – potenciálová jáma</text>

  <!-- axes -->
  <line x1="60" y1="260" x2="60" y2="400" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="60" y1="320" x2="460" y2="320" stroke="#1e3a5f" stroke-width="1.5"/>

  <text x="40" y="268" font-size="11" font-weight="600" fill="#1e3a5f">Φ</text>
  <text x="456" y="314" font-size="11" font-weight="600" fill="#1e3a5f">r</text>

  <!-- flat reference line -->
  <line x1="60" y1="280" x2="460" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="466" y="284" font-size="10" fill="#94a3b8">Φ = 0</text>

  <!-- Newtonian potential: Φ = -GM/r -->
  <path d="M60,400 Q100,395 140,380 Q180,355 210,330 Q240,310 280,290 Q320,284 360,282 Q400,281 460,280"
        stroke="#3b82f6" stroke-width="2.5" fill="none"/>
  <text x="120" y="398" font-size="11" font-weight="600" fill="#3b82f6">Φ = −GM/r</text>

  <!-- Schwarzschild deeper well -->
  <path d="M60,410 Q80,408 110,400 Q150,378 190,340 Q215,310 240,290 Q270,282 320,280 Q380,279 460,280"
        stroke="#ef4444" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <text x="86" y="416" font-size="11" font-weight="600" fill="#ef4444">Schwarzschild</text>

  <!-- mass position marker -->
  <line x1="100" y1="258" x2="100" y2="406" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="100" cy="262" r="8" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="100" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">M</text>

  <!-- distance labels -->
  <text x="100" y="330" font-size="10" fill="#64748b" text-anchor="middle">r → 0</text>
  <text x="400" y="296" font-size="10" fill="#64748b">r → ∞, Φ → 0</text>

  <!-- legend -->
  <line x1="320" y1="360" x2="345" y2="360" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="350" y="364" font-size="10" fill="#1e3a5f">Newton (klasická)</text>
  <line x1="320" y1="378" x2="345" y2="378" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="350" y="382" font-size="10" fill="#1e3a5f">Einstein (obecná rel.)</text>
</svg>