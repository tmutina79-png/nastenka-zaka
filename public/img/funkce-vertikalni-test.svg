<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="system-ui, sans-serif">
  <!-- ===== LEFT: IS a function (passes vertical line test) ===== -->
  <text x="160" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">✓ JE funkce</text>

  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="30" y1="250" x2="300" y2="250"/><line x1="30" y1="40" x2="30" y2="250"/>
  </g>
  <line x1="30" y1="250" x2="305" y2="250" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="30" y1="250" x2="30" y2="35" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Curve (single-valued) -->
  <path d="M40,220 Q100,60 180,140 Q240,200 290,80" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>

  <!-- Vertical line test - passes -->
  <line x1="150" y1="35" x2="150" y2="250" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="150" cy="117" r="5" fill="#16a34a"/>
  <text x="160" y="112" font-size="11" fill="#16a34a" font-weight="600">1 průsečík ✓</text>

  <!-- ===== Divider ===== -->
  <line x1="350" y1="30" x2="350" y2="260" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ===== RIGHT: NOT a function (fails vertical line test) ===== -->
  <text x="520" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">✗ NENÍ funkce</text>

  <line x1="390" y1="250" x2="665" y2="250" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="390" y1="250" x2="390" y2="35" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Circle (not a function) -->
  <circle cx="520" cy="150" r="80" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- Vertical line test - FAILS -->
  <line x1="500" y1="35" x2="500" y2="250" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="500" cy="83" r="5" fill="#dc2626"/>
  <circle cx="500" cy="219" r="5" fill="#dc2626"/>
  <text x="510" y="78" font-size="11" fill="#dc2626" font-weight="600">2 průsečíky ✗</text>

  <!-- Bottom label -->
  <text x="350" y="275" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">Test svislou přímkou: svislá čára smí protínat graf nejvýše v jednom bodě</text>
</svg>
