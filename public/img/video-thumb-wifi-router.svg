<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="8"/>
  <!-- Disk (kruh) pokrytí -->
  <circle cx="140" cy="85" r="55" fill="url(#glow)"/>
  <!-- Kružnice (hranice dosahu) -->
  <circle cx="140" cy="85" r="55" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>
  <!-- Poloměr -->
  <line x1="140" y1="85" x2="195" y2="85" stroke="#34d399" stroke-width="2"/>
  <text x="168" y="78" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">r = 10 m</text>
  <!-- Router bod R -->
  <circle cx="140" cy="85" r="5" fill="#fb923c"/>
  <text x="148" y="100" fill="#fb923c" font-size="11" font-weight="bold">R</text>
  <!-- WiFi ikona -->
  <path d="M128 68 Q140 55 152 68" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <path d="M132 72 Q140 63 148 72" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Body na kružnici -->
  <circle cx="195" cy="85" r="3" fill="#f87171"/>
  <circle cx="140" cy="30" r="3" fill="#f87171"/>
  <circle cx="85" cy="85" r="3" fill="#f87171"/>
  <circle cx="140" cy="140" r="3" fill="#f87171"/>
  <circle cx="178" cy="50" r="3" fill="#f87171"/>
  <circle cx="102" cy="50" r="3" fill="#f87171"/>
  <!-- Popisky -->
  <text x="245" y="55" fill="#818cf8" font-size="10" font-weight="bold">k(R, 10)</text>
  <text x="245" y="70" fill="#818cf8" font-size="8" opacity="0.7">= hranice</text>
  <text x="245" y="100" fill="#60a5fa" font-size="10" font-weight="bold">K(R, 10)</text>
  <text x="245" y="115" fill="#60a5fa" font-size="8" opacity="0.7">= pokrytí</text>
  <!-- Play button -->
  <circle cx="140" cy="85" r="18" fill="rgba(255,255,255,0.12)"/>
  <polygon points="135,76 135,94 150,85" fill="white" opacity="0.9"/>
  <!-- Title -->
  <text x="160" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">WiFi router – dosah signálu</text>
</svg>
