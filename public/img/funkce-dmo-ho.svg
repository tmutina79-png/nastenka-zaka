<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1e3a5f"/></marker>
  </defs>

  <!-- Title -->
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Definiční obor (D) a Obor hodnot (H)</text>

  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="60" y1="50" x2="60" y2="380"/><line x1="120" y1="50" x2="120" y2="380"/>
    <line x1="180" y1="50" x2="180" y2="380"/><line x1="240" y1="50" x2="240" y2="380"/>
    <line x1="300" y1="50" x2="300" y2="380"/><line x1="360" y1="50" x2="360" y2="380"/>
    <line x1="420" y1="50" x2="420" y2="380"/><line x1="480" y1="50" x2="480" y2="380"/>
    <line x1="40" y1="80" x2="500" y2="80"/><line x1="40" y1="140" x2="500" y2="140"/>
    <line x1="40" y1="200" x2="500" y2="200"/><line x1="40" y1="260" x2="500" y2="260"/>
    <line x1="40" y1="320" x2="500" y2="320"/><line x1="40" y1="380" x2="500" y2="380"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="380" x2="500" y2="380" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrD)"/>
  <line x1="60" y1="380" x2="60" y2="42" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrD)"/>
  <text x="505" y="394" font-size="14" font-weight="600" fill="#1e3a5f">x</text>
  <text x="45" y="44" font-size="14" font-weight="600" fill="#1e3a5f">y</text>
  <text x="52" y="394" text-anchor="end" font-size="11" fill="#64748b">0</text>

  <!-- X axis labels -->
  <text x="120" y="398" text-anchor="middle" font-size="11" fill="#64748b">1</text>
  <text x="180" y="398" text-anchor="middle" font-size="11" fill="#64748b">2</text>
  <text x="240" y="398" text-anchor="middle" font-size="11" fill="#64748b">3</text>
  <text x="300" y="398" text-anchor="middle" font-size="11" fill="#64748b">4</text>
  <text x="360" y="398" text-anchor="middle" font-size="11" fill="#64748b">5</text>
  <text x="420" y="398" text-anchor="middle" font-size="11" fill="#64748b">6</text>

  <!-- Y axis labels -->
  <text x="50" y="324" text-anchor="end" font-size="11" fill="#64748b">1</text>
  <text x="50" y="264" text-anchor="end" font-size="11" fill="#64748b">2</text>
  <text x="50" y="204" text-anchor="end" font-size="11" fill="#64748b">3</text>
  <text x="50" y="144" text-anchor="end" font-size="11" fill="#64748b">4</text>
  <text x="50" y="84" text-anchor="end" font-size="11" fill="#64748b">5</text>

  <!-- Parabola: f(x) = -0.3(x-3.5)^2 + 4  — mapped to grid coordinates -->
  <!-- Points: x=1→y=2.125, x=1.5→y=2.8, x=2→y=3.325, x=2.5→y=3.7, x=3→y=3.925,
       x=3.5→y=4, x=4→y=3.925, x=4.5→y=3.7, x=5→y=3.325, x=5.5→y=2.8, x=6→y=2.125 -->
  <polyline
    points="120,252 135,235 150,219 165,206 180,195 195,186 210,179 225,174 240,172
            255,171 270,172 285,174 300,179 315,186 330,195 345,206 360,219 375,235 390,252"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Domain highlight on X axis -->
  <line x1="120" y1="380" x2="390" y2="380" stroke="#16a34a" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <circle cx="120" cy="380" r="5" fill="#16a34a"/><circle cx="390" cy="380" r="5" fill="#16a34a"/>

  <!-- Range highlight on Y axis -->
  <line x1="60" y1="252" x2="60" y2="171" stroke="#dc2626" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <circle cx="60" cy="252" r="5" fill="#dc2626"/><circle cx="60" cy="171" r="5" fill="#dc2626"/>

  <!-- Dashed projection lines -->
  <line x1="120" y1="252" x2="120" y2="380" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="390" y1="252" x2="390" y2="380" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="60" y1="171" x2="255" y2="171" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="60" y1="252" x2="120" y2="252" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Labels -->
  <rect x="175" y="404" width="140" height="22" rx="6" fill="#16a34a" opacity="0.15"/>
  <text x="245" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">D(f) = ⟨1 ; 6,5⟩</text>

  <rect x="2" y="195" width="52" height="42" rx="6" fill="#dc2626" opacity="0.1"/>
  <text x="28" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">H(f)</text>
  <text x="28" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">⟨2,1 ; 3,5⟩</text>

  <!-- Curve label -->
  <text x="310" y="160" font-size="13" font-weight="700" fill="#2563eb">f(x)</text>
</svg>
