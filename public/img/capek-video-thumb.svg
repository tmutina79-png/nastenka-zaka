<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" fill="none">
  <defs>
    <linearGradient id="bgLit" x1="0" y1="0" x2="200" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <!-- Pozadí -->
  <rect width="200" height="130" rx="12" fill="url(#bgLit)" stroke="#86efac" stroke-width="2"/>
  
  <!-- Otevřená kniha -->
  <path d="M60,95 Q100,85 140,95 L140,45 Q100,55 60,45 Z" fill="#fff" stroke="#166534" stroke-width="2"/>
  <line x1="100" y1="50" x2="100" y2="92" stroke="#166534" stroke-width="1.5"/>
  
  <!-- Řádky textu v knize -->
  <line x1="68" y1="58" x2="92" y2="56" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="66" x2="94" y2="64" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="74" x2="95" y2="72" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="108" y1="56" x2="132" y2="58" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="106" y1="64" x2="130" y2="66" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="72" x2="128" y2="74" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Pero -->
  <path d="M150,30 L160,60 L155,62 L145,32 Z" fill="#f59e0b" stroke="#166534" stroke-width="1"/>
  <path d="M157,62 L160,75" stroke="#166534" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Uvozovky -->
  <text x="45" y="45" font-family="Georgia, serif" font-size="28" fill="#166534" opacity="0.5">„</text>
  <text x="155" y="100" font-family="Georgia, serif" font-size="28" fill="#166534" opacity="0.5">"</text>
  
  <!-- Nadpis -->
  <text x="100" y="22" font-family="Georgia, serif" font-size="11" fill="#166534" text-anchor="middle" font-weight="bold">Karel Čapek</text>
  
  <!-- Spodní text -->
  <text x="100" y="118" font-family="sans-serif" font-size="9" fill="#15803d" text-anchor="middle">Citáty a úryvky</text>
  
  <!-- Video badge - levý dolní roh -->
  <rect x="8" y="102" width="42" height="18" rx="4" fill="#166534"/>
  <polygon points="18,107 18,115 25,111" fill="#fff"/>
  <text x="38" y="114" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
