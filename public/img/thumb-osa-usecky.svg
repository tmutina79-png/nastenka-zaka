<svg viewBox="0 0 280 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Pozadí -->
  <rect width="280" height="180" fill="url(#bg)" rx="8"/>
  
  <!-- Úsečka AB -->
  <line x1="60" y1="100" x2="220" y2="100" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="60" cy="100" r="6" fill="#fbbf24"/>
  <circle cx="220" cy="100" r="6" fill="#fbbf24"/>
  <text x="50" y="125" fill="#fbbf24" font-size="14" font-weight="bold" font-family="system-ui">A</text>
  <text x="225" y="125" fill="#fbbf24" font-size="14" font-weight="bold" font-family="system-ui">B</text>
  
  <!-- Kružnice k1 -->
  <circle cx="60" cy="100" r="80" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  
  <!-- Kružnice k2 -->
  <circle cx="220" cy="100" r="80" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
  
  <!-- Osa úsečky (vertikální) -->
  <line x1="140" y1="20" x2="140" y2="160" stroke="#34d399" stroke-width="3"/>
  
  <!-- Průsečíky P a Q -->
  <circle cx="140" cy="37" r="5" fill="#f87171"/>
  <circle cx="140" cy="163" r="5" fill="#f87171"/>
  
  <!-- Střed S -->
  <circle cx="140" cy="100" r="5" fill="#fb923c"/>
  <text x="148" y="95" fill="#fb923c" font-size="12" font-weight="bold" font-family="system-ui">S</text>
  
  <!-- Značka kolmosti -->
  <rect x="140" y="88" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  
  <!-- Popisek -->
  <text x="165" y="50" fill="#34d399" font-size="14" font-weight="bold" font-family="system-ui">o</text>
  
  <!-- Play button overlay -->
  <circle cx="140" cy="90" r="24" fill="rgba(59, 130, 246, 0.85)"/>
  <polygon points="133,80 133,100 153,90" fill="white"/>
</svg>