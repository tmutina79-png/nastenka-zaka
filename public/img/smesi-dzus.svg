<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 310">
  <rect width="520" height="310" rx="16" fill="#f8fafc"/>
  <text x="260" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">Příklad: Míchání džusu</text>

  <!-- Bottle A -->
  <rect x="50" y="55" width="80" height="130" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="65" y="48" width="50" height="14" rx="4" fill="#f59e0b"/>
  <rect x="52" y="100" width="76" height="83" rx="6" fill="#f59e0b" opacity="0.3"/>
  <text x="90" y="130" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="#92400e">30%</text>
  <text x="90" y="152" text-anchor="middle" font-family="system-ui" font-size="10" fill="#b45309">ovocný podíl</text>
  <text x="90" y="202" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#92400e">4 dl</text>

  <!-- Plus -->
  <text x="175" y="125" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="700" fill="#94a3b8">+</text>

  <!-- Bottle B -->
  <rect x="210" y="55" width="80" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="225" y="48" width="50" height="14" rx="4" fill="#3b82f6"/>
  <rect x="212" y="115" width="76" height="68" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="250" y="130" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="#1e40af">80%</text>
  <text x="250" y="152" text-anchor="middle" font-family="system-ui" font-size="10" fill="#2563eb">ovocný podíl</text>
  <text x="250" y="202" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">6 dl</text>

  <!-- Arrow -->
  <text x="335" y="125" text-anchor="middle" font-family="system-ui" font-size="22" fill="#94a3b8">→</text>

  <!-- Glass result -->
  <rect x="380" y="50" width="100" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="382" y="80" width="96" height="108" rx="8" fill="#22c55e" opacity="0.2"/>
  <text x="430" y="125" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="#166534">60%</text>
  <text x="430" y="147" text-anchor="middle" font-family="system-ui" font-size="10" fill="#16a34a">ovocný podíl</text>
  <text x="430" y="208" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">10 dl</text>

  <!-- Calculation -->
  <rect x="30" y="230" width="460" height="60" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="260" y="252" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#166534">Řešení:</text>
  <text x="260" y="270" text-anchor="middle" font-family="system-ui" font-size="11" fill="#15803d">0,30 · 4 + 0,80 · 6 = 1,2 + 4,8 = 6,0 → c = 6,0 / 10 = 0,60 = 60 %</text>
  <text x="260" y="284" text-anchor="middle" font-family="system-ui" font-size="10" fill="#16a34a">Ověření: 30 % &lt; 60 % &lt; 80 % ✓ (leží mezi koncentracemi složek)</text>
</svg>