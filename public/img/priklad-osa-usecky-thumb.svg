<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  
  <rect width="320" height="180" fill="url(#bg)" rx="8"/>
  
  <!-- Úsečka AB -->
  <line x1="80" y1="100" x2="240" y2="100" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="80" cy="100" r="5" fill="#fbbf24"/>
  <circle cx="240" cy="100" r="5" fill="#fbbf24"/>
  <text x="70" y="120" fill="#fbbf24" font-size="12" font-weight="bold">A</text>
  <text x="245" y="120" fill="#fbbf24" font-size="12" font-weight="bold">B</text>
  
  <!-- Kružnice -->
  <circle cx="80" cy="100" r="60" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <circle cx="240" cy="100" r="60" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  
  <!-- Osa -->
  <line x1="160" y1="40" x2="160" y2="140" stroke="#34d399" stroke-width="3"/>
  
  <!-- Průsečíky -->
  <circle cx="160" cy="55" r="4" fill="#f87171"/>
  <circle cx="160" cy="145" r="4" fill="#f87171"/>
  
  <!-- Play button -->
  <circle cx="160" cy="90" r="20" fill="rgba(255,255,255,0.15)"/>
  <polygon points="155,80 155,100 170,90" fill="white"/>
  
  <text x="160" y="168" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Konstrukce osy úsečky</text>
</svg>
