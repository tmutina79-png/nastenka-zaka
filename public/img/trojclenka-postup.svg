<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="system-ui, sans-serif">
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Trojčlenka – postup řešení</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="10" y="40" width="150" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="85" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">① Zapiš údaje</text>
  <text x="85" y="84" text-anchor="middle" font-size="11" fill="#1e3a5f">3 kg … 75 Kč</text>
  <text x="85" y="102" text-anchor="middle" font-size="11" fill="#1e3a5f">5 kg … ? Kč</text>
  <text x="85" y="120" text-anchor="middle" font-size="10" fill="#64748b">pod sebe, stejné jednotky</text>

  <!-- Arrow -->
  <text x="178" y="90" font-size="20" fill="#94a3b8">→</text>

  <!-- Step 2 -->
  <rect x="195" y="40" width="150" height="90" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="270" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">② Urči typ</text>
  <text x="270" y="84" text-anchor="middle" font-size="11" fill="#1e3a5f">Více kg → víc Kč?</text>
  <text x="270" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">ANO → přímá</text>
  <text x="270" y="120" text-anchor="middle" font-size="10" fill="#64748b">(NE → nepřímá)</text>

  <!-- Arrow -->
  <text x="363" y="90" font-size="20" fill="#94a3b8">→</text>

  <!-- Step 3 -->
  <rect x="380" y="40" width="130" height="90" rx="10" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <text x="445" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#ca8a04">③ Vypočítej</text>
  <text x="445" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">75 · 5</text>
  <line x1="415" y1="92" x2="475" y2="92" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="445" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">3</text>
  <text x="445" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">= 125 Kč</text>

  <!-- Bottom: formulas -->
  <rect x="30" y="155" width="210" height="85" rx="10" fill="#2563eb" opacity="0.07"/>
  <text x="135" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Přímá úměrnost</text>
  <text x="135" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">a₁ / b₁ = a₂ / b₂</text>
  <text x="135" y="224" text-anchor="middle" font-size="11" fill="#64748b">podíl zůstává stejný</text>

  <rect x="280" y="155" width="210" height="85" rx="10" fill="#dc2626" opacity="0.07"/>
  <text x="385" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Nepřímá úměrnost</text>
  <text x="385" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">a₁ · b₁ = a₂ · b₂</text>
  <text x="385" y="224" text-anchor="middle" font-size="11" fill="#64748b">součin zůstává stejný</text>
</svg>
