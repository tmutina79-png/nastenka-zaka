<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgK" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="240" rx="12" fill="url(#bgK)"/>
  
  <!-- Road A -->
  <line x1="130" y1="185" x2="40" y2="55" stroke="#475569" stroke-width="28" stroke-linecap="round"/>
  <line x1="130" y1="175" x2="50" y2="60" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,6"/>
  
  <!-- Road B -->
  <line x1="130" y1="185" x2="360" y2="110" stroke="#475569" stroke-width="28" stroke-linecap="round"/>
  <line x1="140" y1="180" x2="350" y2="115" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,6"/>
  
  <!-- Intersection V -->
  <circle cx="130" cy="185" r="5" fill="#f87171"/>
  <text x="113" y="202" font-size="13" font-weight="700" fill="#f87171">V</text>
  
  <!-- Angle arc -->
  <path d="M 118,166 A 22,22 0 0,1 148,173" fill="none" stroke="#fb923c" stroke-width="2"/>
  
  <!-- Bisector -->
  <line x1="130" y1="185" x2="270" y2="52" stroke="#818cf8" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="275" y="48" font-size="11" font-weight="700" fill="#818cf8">o</text>
  
  <!-- Camera on bisector -->
  <rect x="192" y="108" width="20" height="14" rx="3" fill="#34d399"/>
  <circle cx="207" cy="115" r="4" fill="#1e293b"/>
  <circle cx="207" cy="115" r="2.5" fill="#60a5fa"/>
  <circle cx="196" cy="111" r="2" fill="#f87171"/>
  
  <!-- Distance lines -->
  <line x1="202" y1="115" x2="108" y2="142" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="202" y1="115" x2="247" y2="150" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Labels -->
  <text x="42" y="44" font-size="13" font-weight="700" fill="#94a3b8">a</text>
  <text x="350" y="102" font-size="13" font-weight="700" fill="#94a3b8">b</text>
  
  <rect x="148" y="82" width="70" height="20" rx="6" fill="rgba(16,185,129,0.2)"/>
  <text x="183" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">d₁ = d₂</text>
  
  <!-- Play button -->
  <circle cx="200" cy="120" r="28" fill="rgba(0,0,0,0.45)"/>
  <path d="M192,106 L192,134 L215,120 Z" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">📹 Kamera na křižovatce – osa úhlu</text>
</svg>
