<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="system-ui, sans-serif">
  <text x="375" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Porovnání: přímá vs. nepřímá úměrnost</text>

  <!-- ===== LEFT: Přímá ===== -->
  <rect x="20" y="45" width="340" height="340" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">📈 Přímá úměrnost</text>

  <g font-size="13" fill="#1e3a5f">
    <text x="40" y="105" font-weight="600">Vzorec:</text>
    <text x="130" y="105" font-weight="700" fill="#2563eb">y = k · x</text>

    <text x="40" y="135" font-weight="600">Konstanta:</text>
    <text x="150" y="135">k = y / x</text>

    <text x="40" y="165" font-weight="600">Graf:</text>
    <text x="130" y="165">přímka procházející [0, 0]</text>

    <text x="40" y="195" font-weight="600">Chování:</text>
    <text x="150" y="195">x roste → y roste</text>
    <text x="150" y="213">x klesá → y klesá</text>
  </g>

  <!-- Mini table -->
  <g font-size="12" fill="#1e3a5f">
    <rect x="40" y="230" width="300" height="26" rx="4" fill="#2563eb" opacity="0.1"/>
    <text x="90" y="248" text-anchor="middle" font-weight="700">x</text>
    <text x="155" y="248" text-anchor="middle">1</text>
    <text x="205" y="248" text-anchor="middle">2</text>
    <text x="255" y="248" text-anchor="middle">3</text>
    <text x="305" y="248" text-anchor="middle">4</text>

    <rect x="40" y="256" width="300" height="26" rx="4" fill="white" stroke="#bfdbfe" stroke-width="1"/>
    <text x="90" y="274" text-anchor="middle" font-weight="700">y = 3x</text>
    <text x="155" y="274" text-anchor="middle">3</text>
    <text x="205" y="274" text-anchor="middle">6</text>
    <text x="255" y="274" text-anchor="middle">9</text>
    <text x="305" y="274" text-anchor="middle">12</text>

    <rect x="40" y="282" width="300" height="26" rx="4" fill="#2563eb" opacity="0.05"/>
    <text x="90" y="300" text-anchor="middle" font-weight="700" fill="#2563eb">y/x</text>
    <text x="155" y="300" text-anchor="middle" fill="#2563eb">3</text>
    <text x="205" y="300" text-anchor="middle" fill="#2563eb">3</text>
    <text x="255" y="300" text-anchor="middle" fill="#2563eb">3</text>
    <text x="305" y="300" text-anchor="middle" fill="#2563eb">3</text>
  </g>
  <text x="190" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Podíl y/x je stále stejný ✓</text>

  <!-- Příklad -->
  <text x="190" y="370" text-anchor="middle" font-size="11" fill="#64748b">🛒 2 kg jablek = 50 Kč → 4 kg = 100 Kč</text>

  <!-- ===== RIGHT: Nepřímá ===== -->
  <rect x="390" y="45" width="340" height="340" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="560" y="75" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">📉 Nepřímá úměrnost</text>

  <g font-size="13" fill="#1e3a5f">
    <text x="410" y="105" font-weight="600">Vzorec:</text>
    <text x="500" y="105" font-weight="700" fill="#dc2626">y = k / x</text>

    <text x="410" y="135" font-weight="600">Konstanta:</text>
    <text x="520" y="135">k = x · y</text>

    <text x="410" y="165" font-weight="600">Graf:</text>
    <text x="500" y="165">hyperbola (křivka)</text>

    <text x="410" y="195" font-weight="600">Chování:</text>
    <text x="520" y="195">x roste → y klesá</text>
    <text x="520" y="213">x klesá → y roste</text>
  </g>

  <!-- Mini table -->
  <g font-size="12" fill="#1e3a5f">
    <rect x="410" y="230" width="300" height="26" rx="4" fill="#dc2626" opacity="0.1"/>
    <text x="460" y="248" text-anchor="middle" font-weight="700">x</text>
    <text x="525" y="248" text-anchor="middle">1</text>
    <text x="575" y="248" text-anchor="middle">2</text>
    <text x="625" y="248" text-anchor="middle">3</text>
    <text x="675" y="248" text-anchor="middle">6</text>

    <rect x="410" y="256" width="300" height="26" rx="4" fill="white" stroke="#fecaca" stroke-width="1"/>
    <text x="460" y="274" text-anchor="middle" font-weight="700">y = 12/x</text>
    <text x="525" y="274" text-anchor="middle">12</text>
    <text x="575" y="274" text-anchor="middle">6</text>
    <text x="625" y="274" text-anchor="middle">4</text>
    <text x="675" y="274" text-anchor="middle">2</text>

    <rect x="410" y="282" width="300" height="26" rx="4" fill="#dc2626" opacity="0.05"/>
    <text x="460" y="300" text-anchor="middle" font-weight="700" fill="#dc2626">x·y</text>
    <text x="525" y="300" text-anchor="middle" fill="#dc2626">12</text>
    <text x="575" y="300" text-anchor="middle" fill="#dc2626">12</text>
    <text x="625" y="300" text-anchor="middle" fill="#dc2626">12</text>
    <text x="675" y="300" text-anchor="middle" fill="#dc2626">12</text>
  </g>
  <text x="560" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Součin x·y je stále stejný ✓</text>

  <!-- Příklad -->
  <text x="560" y="370" text-anchor="middle" font-size="11" fill="#64748b">🚗 60 km/h → 2 h cesty, 120 km/h → 1 h cesty</text>
</svg>
