<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="0.5" opacity="0.8">
    <line x1="40" y1="160" x2="370" y2="160"/>
    <line x1="200" y1="30" x2="200" y2="230"/>
  </g>
  <!-- Axes -->
  <g stroke="#475569" stroke-width="1.5">
    <line x1="30" y1="160" x2="380" y2="160"/>
    <line x1="200" y1="240" x2="200" y2="20"/>
  </g>
  <!-- Arrow x -->
  <polygon points="380,160 372,156 372,164" fill="#475569"/>
  <!-- Arrow y -->
  <polygon points="200,20 196,28 204,28" fill="#475569"/>
  <!-- Curve f(x)=1/(x-3) left branch -->
  <path d="M60,148 Q100,150 140,152 Q160,154 170,158 Q175,164 178,175 Q180,195 180,220" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Curve right branch -->
  <path d="M230,20 Q232,60 234,100 Q236,130 240,145 Q250,155 280,157 Q320,159 370,160" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Asymptote x=3 -->
  <line x1="205" y1="25" x2="205" y2="235" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.8"/>
  <!-- Forbidden zone -->
  <rect x="30" y="30" width="175" height="200" fill="#ef4444" opacity="0.04" rx="4"/>
  <!-- D(f) highlight on x-axis -->
  <line x1="30" y1="162" x2="198" y2="162" stroke="#10b981" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="212" y1="162" x2="375" y2="162" stroke="#10b981" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <!-- Hollow dot at x=3 -->
  <circle cx="205" cy="160" r="5" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <!-- Labels -->
  <text x="200" y="15" text-anchor="middle" fill="#1e293b" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700">📐 Definiční obor – D(f)</text>
  <text x="375" y="153" text-anchor="end" fill="#475569" font-family="Segoe UI,sans-serif" font-size="11">x</text>
  <text x="210" y="30" text-anchor="start" fill="#475569" font-family="Segoe UI,sans-serif" font-size="11">y</text>
  <text x="215" y="50" fill="#ef4444" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600">x ≠ 3</text>
  <!-- Formula -->
  <text x="60" y="240" fill="#2563eb" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700">f(x) = 1/(x − 3)</text>
  <text x="250" y="240" fill="#059669" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700">D(f) = ℝ ∖ {3}</text>
  <!-- Play icon overlay -->
  <circle cx="200" cy="130" r="28" fill="rgba(59,130,246,0.7)"/>
  <polygon points="192,116 192,144 216,130" fill="white"/>
</svg>
