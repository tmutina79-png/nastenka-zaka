<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="520" rx="16" fill="url(#bg1)" stroke="#c7d2fe" stroke-width="2"/>
  
  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e40af">Osa úsečky – pojmy a značení</text>
  
  <!-- Úsečka AB -->
  <line x1="160" y1="280" x2="560" y2="280" stroke="#334155" stroke-width="3"/>
  
  <!-- Body A a B -->
  <circle cx="160" cy="280" r="8" fill="#ef4444"/>
  <text x="160" y="310" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">A</text>
  <circle cx="560" cy="280" r="8" fill="#ef4444"/>
  <text x="560" y="310" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">B</text>
  
  <!-- Střed S -->
  <circle cx="360" cy="280" r="7" fill="#f59e0b"/>
  <text x="375" y="303" font-size="18" font-weight="700" fill="#f59e0b">S</text>
  
  <!-- Osa úsečky (svislá kolmice) -->
  <line x1="360" y1="65" x2="360" y2="490" stroke="#3b82f6" stroke-width="3" stroke-dasharray="12,6"/>
  <text x="340" y="80" text-anchor="end" font-size="18" font-weight="700" fill="#3b82f6">osa o</text>
  
  <!-- Značka kolmosti -->
  <rect x="360" y="260" width="20" height="20" fill="none" stroke="#64748b" stroke-width="2"/>
  
  <!-- Bod X na ose -->
  <circle cx="360" cy="160" r="7" fill="#10b981"/>
  <text x="380" y="155" font-size="18" font-weight="700" fill="#10b981">X</text>
  
  <!-- Vzdálenosti |XA| a |XB| -->
  <line x1="360" y1="160" x2="160" y2="280" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="360" y1="160" x2="560" y2="280" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- |XA| label -->
  <text x="235" y="200" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981" transform="rotate(-31, 235, 200)">|XA|</text>
  <!-- |XB| label -->
  <text x="485" y="200" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981" transform="rotate(31, 485, 200)">|XB|</text>
  
  <!-- Rovnost -->
  <rect x="268" y="115" width="185" height="32" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="360" y="137" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">|XA| = |XB|</text>
  
  <!-- Vzdálenost |AS| a |SB| -->
  <line x1="160" y1="340" x2="355" y2="340" stroke="#f59e0b" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
  <text x="258" y="360" text-anchor="middle" font-size="15" font-weight="600" fill="#f59e0b">|AS|</text>
  <line x1="365" y1="340" x2="560" y2="340" stroke="#f59e0b" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
  <text x="463" y="360" text-anchor="middle" font-size="15" font-weight="600" fill="#f59e0b">|SB|</text>
  
  <!-- |AS| = |SB| -->
  <rect x="275" y="373" width="170" height="30" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="360" y="394" text-anchor="middle" font-size="16" font-weight="700" fill="#f59e0b">|AS| = |SB|</text>
  
  <!-- Bod Y na ose (dole) -->
  <circle cx="360" cy="420" r="7" fill="#8b5cf6"/>
  <text x="380" y="418" font-size="18" font-weight="700" fill="#8b5cf6">Y</text>
  <line x1="360" y1="420" x2="160" y2="280" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="360" y1="420" x2="560" y2="280" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  
  <!-- Legend box -->
  <rect x="20" y="440" width="680" height="65" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="50" cy="462" r="5" fill="#3b82f6"/>
  <text x="62" y="467" font-size="13" fill="#334155"><tspan font-weight="600">Osa úsečky o</tspan> – kolmice v bodě S</text>
  <circle cx="50" cy="485" r="5" fill="#f59e0b"/>
  <text x="62" y="490" font-size="13" fill="#334155"><tspan font-weight="600">Střed S</tspan> – |AS| = |SB|</text>
  <circle cx="310" cy="462" r="5" fill="#10b981"/>
  <text x="322" y="467" font-size="13" fill="#334155"><tspan font-weight="600">Bod X na ose</tspan> – |XA| = |XB|</text>
  <circle cx="310" cy="485" r="5" fill="#ef4444"/>
  <text x="322" y="490" font-size="13" fill="#334155"><tspan font-weight="600">Koncové body A, B</tspan></text>
  <text x="560" y="467" font-size="13" fill="#334155">⊥ = kolmost (90°)</text>
</svg>
