<svg viewBox="0 0 280 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Pozadí -->
  <rect width="280" height="180" fill="url(#bg2)" rx="8"/>
  
  <!-- Přímka p -->
  <line x1="30" y1="120" x2="250" y2="70" stroke="#fbbf24" stroke-width="3"/>
  <text x="245" y="60" fill="#fbbf24" font-size="14" font-weight="bold" font-family="system-ui">p</text>
  
  <!-- Přímka q -->
  <line x1="30" y1="50" x2="250" y2="130" stroke="#60a5fa" stroke-width="3"/>
  <text x="245" y="145" fill="#60a5fa" font-size="14" font-weight="bold" font-family="system-ui">q</text>
  
  <!-- Průsečík V -->
  <circle cx="140" cy="90" r="6" fill="#f87171"/>
  <text x="125" y="80" fill="#f87171" font-size="12" font-weight="bold" font-family="system-ui">V</text>
  
  <!-- Osa o₁ (diagonální nahoru) -->
  <line x1="70" y1="160" x2="210" y2="20" stroke="#34d399" stroke-width="3"/>
  <text x="205" y="35" fill="#34d399" font-size="12" font-weight="bold" font-family="system-ui">o₁</text>
  
  <!-- Osa o₂ (diagonální dolů) -->
  <line x1="70" y1="20" x2="210" y2="160" stroke="#fb923c" stroke-width="3"/>
  <text x="205" y="155" fill="#fb923c" font-size="12" font-weight="bold" font-family="system-ui">o₂</text>
  
  <!-- Značka kolmosti os -->
  <rect x="140" y="80" width="8" height="8" fill="none" stroke="#94a3b8" stroke-width="1.5" transform="rotate(45, 144, 84)"/>
  
  <!-- Bod X na ose -->
  <circle cx="170" cy="60" r="4" fill="#f472b6"/>
  <text x="175" y="55" fill="#f472b6" font-size="10" font-weight="bold" font-family="system-ui">X</text>
  
  <!-- Kolmice od X k přímkám (čárkované) -->
  <line x1="170" y1="60" x2="185" y2="82" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.8"/>
  <line x1="170" y1="60" x2="155" y2="78" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.8"/>
  
  <!-- Play button overlay -->
  <circle cx="140" cy="90" r="24" fill="rgba(59, 130, 246, 0.85)"/>
  <polygon points="133,80 133,100 153,90" fill="white"/>
</svg>