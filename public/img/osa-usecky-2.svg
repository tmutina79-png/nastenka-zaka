<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#ede8ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="520" rx="16" fill="url(#bg2)" stroke="#c4b5fd" stroke-width="2"/>
  
  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#5b21b6">Konstrukce osy úsečky – krok za krokem</text>
  
  <!-- STEP 1 – draw AB -->
  <rect x="20" y="56" width="160" height="24" rx="6" fill="#7c3aed" opacity="0.15"/>
  <text x="100" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">① Narýsuj AB</text>
  <line x1="40" y1="100" x2="170" y2="100" stroke="#334155" stroke-width="2.5"/>
  <circle cx="40" cy="100" r="5" fill="#ef4444"/>
  <text x="40" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">A</text>
  <circle cx="170" cy="100" r="5" fill="#ef4444"/>
  <text x="170" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">B</text>
  
  <!-- STEP 2 – kružnice k₁(A; r) -->
  <rect x="195" y="56" width="160" height="24" rx="6" fill="#2563eb" opacity="0.15"/>
  <text x="275" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">② Kružnice k₁(A; r)</text>
  <line x1="215" y1="130" x2="345" y2="130" stroke="#334155" stroke-width="2"/>
  <circle cx="215" cy="130" r="5" fill="#ef4444"/>
  <text x="215" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">A</text>
  <circle cx="345" cy="130" r="5" fill="#ef4444"/>
  <text x="345" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">B</text>
  <circle cx="215" cy="130" r="85" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="215" y="56" text-anchor="middle" font-size="11" fill="#3b82f6">k₁</text>
  
  <!-- STEP 3 – kružnice k₂(B; r) -->
  <rect x="370" y="56" width="160" height="24" rx="6" fill="#0891b2" opacity="0.15"/>
  <text x="450" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#0891b2">③ Kružnice k₂(B; r)</text>
  <line x1="390" y1="130" x2="520" y2="130" stroke="#334155" stroke-width="2"/>
  <circle cx="390" cy="130" r="5" fill="#ef4444"/>
  <text x="390" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">A</text>
  <circle cx="520" cy="130" r="5" fill="#ef4444"/>
  <text x="520" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">B</text>
  <circle cx="390" cy="130" r="85" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="520" cy="130" r="85" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="520" y="56" text-anchor="middle" font-size="11" fill="#06b6d4">k₂</text>
  
  <!-- STEP 4 – průsečíky P, Q -->
  <rect x="545" y="56" width="160" height="24" rx="6" fill="#059669" opacity="0.15"/>
  <text x="625" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">④ Průsečíky P, Q</text>
  <line x1="565" y1="130" x2="695" y2="130" stroke="#334155" stroke-width="2"/>
  <circle cx="565" cy="130" r="5" fill="#ef4444"/>
  <circle cx="695" cy="130" r="5" fill="#ef4444"/>
  <circle cx="565" cy="130" r="85" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <circle cx="695" cy="130" r="85" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- P and Q approximate intersections of two circles r=85, centers 130 apart -->
  <circle cx="630" cy="64" r="5" fill="#10b981"/>
  <text x="645" y="60" font-size="13" font-weight="700" fill="#10b981">P</text>
  <circle cx="630" cy="196" r="5" fill="#10b981"/>
  <text x="645" y="200" font-size="13" font-weight="700" fill="#10b981">Q</text>
  
  <!-- MAIN DIAGRAM – Full construction -->
  <rect x="40" y="185" width="640" height="320" rx="14" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="360" y="210" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">⑤ Výsledek: Spoj P a Q → osa úsečky</text>
  
  <!-- Main AB line -->
  <line x1="140" y1="370" x2="580" y2="370" stroke="#334155" stroke-width="3"/>
  
  <!-- Points A, B -->
  <circle cx="140" cy="370" r="8" fill="#ef4444"/>
  <text x="140" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">A</text>
  <circle cx="580" cy="370" r="8" fill="#ef4444"/>
  <text x="580" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">B</text>
  
  <!-- Kružnice k₁(A; r) -->
  <circle cx="140" cy="370" r="250" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,5" opacity="0.35"/>
  <text x="50" y="145" font-size="14" font-weight="600" fill="#3b82f6">k₁(A; r)</text>
  
  <!-- Kružnice k₂(B; r) -->
  <circle cx="580" cy="370" r="250" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="8,5" opacity="0.35"/>
  <text x="620" y="145" font-size="14" font-weight="600" fill="#06b6d4">k₂(B; r)</text>
  
  <!-- Intersection points P, Q  (circles r=250, centers 440 apart) -->
  <!-- Using Pythagorean theorem: x = 220 from A, y = ±sqrt(250²-220²) = ±sqrt(62500-48400) = ±sqrt(14100) ≈ ±118.7 -->
  <circle cx="360" cy="251" r="8" fill="#10b981"/>
  <text x="380" y="247" font-size="18" font-weight="700" fill="#10b981">P</text>
  <circle cx="360" cy="489" r="8" fill="#10b981"/>
  <text x="380" y="493" font-size="18" font-weight="700" fill="#10b981">Q</text>
  
  <!-- Osa úsečky PQ -->
  <line x1="360" y1="225" x2="360" y2="500" stroke="#10b981" stroke-width="3"/>
  <text x="340" y="238" text-anchor="end" font-size="16" font-weight="700" fill="#10b981">osa o</text>
  
  <!-- Střed S -->
  <circle cx="360" cy="370" r="6" fill="#f59e0b"/>
  <text x="375" y="390" font-size="16" font-weight="700" fill="#f59e0b">S</text>
  
  <!-- Kolmost square -->
  <rect x="360" y="354" width="16" height="16" fill="none" stroke="#64748b" stroke-width="1.5"/>
  
  <!-- Radius label from A to P -->
  <line x1="140" y1="370" x2="360" y2="251" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="230" y="290" font-size="13" font-weight="600" fill="#3b82f6" transform="rotate(-28, 230, 290)">r</text>
  
  <!-- Radius label from B to P -->
  <line x1="580" y1="370" x2="360" y2="251" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="490" y="290" font-size="13" font-weight="600" fill="#06b6d4" transform="rotate(28, 490, 290)">r</text>
</svg>
