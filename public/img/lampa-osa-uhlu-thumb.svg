<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glowG" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.3)"/>
      <stop offset="60%" stop-color="rgba(251,191,36,0.05)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="240" rx="12" fill="url(#bgG)"/>
  
  <!-- Wall A (rameno a) -->
  <line x1="120" y1="190" x2="50" y2="60" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Wall B (rameno b) -->
  <line x1="120" y1="190" x2="340" y2="120" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Vertex V -->
  <circle cx="120" cy="190" r="6" fill="#f87171"/>
  <text x="100" y="208" font-size="14" font-weight="700" fill="#f87171">V</text>
  
  <!-- Angle arc -->
  <path d="M 105,168 A 25,25 0 0,1 141,177" fill="none" stroke="#fb923c" stroke-width="2"/>
  <text x="140" y="170" font-size="12" font-weight="700" fill="#fb923c">α</text>
  
  <!-- Bisector (osa úhlu) -->
  <line x1="120" y1="190" x2="260" y2="55" stroke="#818cf8" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="265" y="50" font-size="11" font-weight="700" fill="#818cf8">o</text>
  
  <!-- Lamp glow -->
  <circle cx="195" cy="118" r="50" fill="url(#glowG)"/>
  
  <!-- Lamp -->
  <circle cx="195" cy="118" r="10" fill="#fbbf24"/>
  <circle cx="195" cy="118" r="5" fill="#fff"/>
  
  <!-- Distance lines -->
  <line x1="195" y1="118" x2="102" y2="145" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="195" y1="118" x2="236" y2="156" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Wall labels -->
  <text x="58" y="50" font-size="13" font-weight="700" fill="#94a3b8">a</text>
  <text x="330" y="112" font-size="13" font-weight="700" fill="#94a3b8">b</text>
  
  <!-- d=d label -->
  <rect x="140" y="78" width="70" height="22" rx="6" fill="rgba(16,185,129,0.2)"/>
  <text x="175" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">d₁ = d₂</text>
  
  <!-- Play button overlay -->
  <circle cx="200" cy="120" r="28" fill="rgba(0,0,0,0.45)"/>
  <path d="M192,106 L192,134 L215,120 Z" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">💡 Lampa na rohu chodby – osa úhlu</text>
</svg>
