<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, sans-serif">
  <!-- ===== LEFT: IS a function ===== -->
  <text x="160" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">✓ Toto JE funkce</text>

  <!-- Set A -->
  <ellipse cx="80" cy="180" rx="55" ry="100" fill="#eff6ff" stroke="#1e3a5f" stroke-width="2"/>
  <text x="80" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">A</text>
  <circle cx="80" cy="120" r="6" fill="#3b82f6"/><text x="80" y="124" text-anchor="middle" font-size="12" fill="white" font-weight="700">1</text>
  <circle cx="80" cy="170" r="6" fill="#3b82f6"/><text x="80" y="174" text-anchor="middle" font-size="12" fill="white" font-weight="700">2</text>
  <circle cx="80" cy="220" r="6" fill="#3b82f6"/><text x="80" y="224" text-anchor="middle" font-size="12" fill="white" font-weight="700">3</text>
  <circle cx="80" cy="270" r="6" fill="#3b82f6"/><text x="80" y="274" text-anchor="middle" font-size="12" fill="white" font-weight="700">4</text>

  <!-- Set B -->
  <ellipse cx="240" cy="180" rx="55" ry="100" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="240" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">B</text>
  <circle cx="240" cy="130" r="6" fill="#16a34a"/><text x="240" y="134" text-anchor="middle" font-size="12" fill="white" font-weight="700">a</text>
  <circle cx="240" cy="190" r="6" fill="#16a34a"/><text x="240" y="194" text-anchor="middle" font-size="12" fill="white" font-weight="700">b</text>
  <circle cx="240" cy="250" r="6" fill="#16a34a"/><text x="240" y="254" text-anchor="middle" font-size="12" fill="white" font-weight="700">c</text>

  <!-- Arrows (each element mapped to exactly one) -->
  <defs>
    <marker id="ah1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1e3a5f"/></marker>
  </defs>
  <line x1="88" y1="120" x2="232" y2="130" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="88" y1="170" x2="232" y2="130" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="88" y1="220" x2="232" y2="190" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="88" y1="270" x2="232" y2="250" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>

  <text x="160" y="310" text-anchor="middle" font-size="11" fill="#64748b">Každý prvek A má právě jeden obraz v B</text>

  <!-- ===== Divider ===== -->
  <line x1="370" y1="40" x2="370" y2="300" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ===== RIGHT: NOT a function ===== -->
  <text x="590" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">✗ Toto NENÍ funkce</text>

  <!-- Set A -->
  <ellipse cx="500" cy="180" rx="55" ry="100" fill="#eff6ff" stroke="#1e3a5f" stroke-width="2"/>
  <text x="500" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">A</text>
  <circle cx="500" cy="120" r="6" fill="#3b82f6"/><text x="500" y="124" text-anchor="middle" font-size="12" fill="white" font-weight="700">1</text>
  <circle cx="500" cy="170" r="6" fill="#3b82f6"/><text x="500" y="174" text-anchor="middle" font-size="12" fill="white" font-weight="700">2</text>
  <circle cx="500" cy="220" r="6" fill="#3b82f6"/><text x="500" y="224" text-anchor="middle" font-size="12" fill="white" font-weight="700">3</text>
  <circle cx="500" cy="270" r="6" fill="#3b82f6"/><text x="500" y="274" text-anchor="middle" font-size="12" fill="white" font-weight="700">4</text>

  <!-- Set B -->
  <ellipse cx="680" cy="180" rx="55" ry="100" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">B</text>
  <circle cx="680" cy="130" r="6" fill="#dc2626"/><text x="680" y="134" text-anchor="middle" font-size="12" fill="white" font-weight="700">a</text>
  <circle cx="680" cy="190" r="6" fill="#dc2626"/><text x="680" y="194" text-anchor="middle" font-size="12" fill="white" font-weight="700">b</text>
  <circle cx="680" cy="250" r="6" fill="#dc2626"/><text x="680" y="254" text-anchor="middle" font-size="12" fill="white" font-weight="700">c</text>

  <!-- Arrows – element 2 goes to TWO places (NOT a function) + element 4 has no arrow -->
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
  </defs>
  <line x1="508" y1="120" x2="672" y2="130" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="508" y1="170" x2="672" y2="130" stroke="#dc2626" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="508" y1="170" x2="672" y2="250" stroke="#dc2626" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="508" y1="220" x2="672" y2="190" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#ah1)"/>
  <!-- 4 has NO arrow -->

  <text x="590" y="310" text-anchor="middle" font-size="11" fill="#dc2626">Prvek 2 má dva obrazy, prvek 4 nemá žádný</text>
</svg>
